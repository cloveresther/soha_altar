<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>복사단 배정표</title>
<style>
  :root{
    --bg:#f4f2ec; --card:#ffffff; --line:#e7e4db; --line2:#d3cfc3;
    --text:#27251f; --muted:#6f6b61; --hint:#a09b8e;
    --info:#1f6091; --info-bg:#e8f0f7; --info-line:#9cc1de;
    --ok:#3d6a1c; --ok-bg:#eaf2dd; --warn-bg:#f9eed8; --warn:#8a5a12;
    --danger:#a83232; --danger-bg:#fbeaea; --danger-line:#e3a9a9;
    --sun:#f6e9e3; --sat:#e9f0f6;
    --hong:#a83232; --nok:#3d6a1c; --baek:#8a7a2e; --bo:#6b3fa0;
    --hong-bg:#f7e9e6; --nok-bg:#eaf1e0; --baek-bg:#f4eed9; --bo-bg:#efe9f5;
    --shadow:0 1px 3px rgba(40,36,28,.06), 0 1px 2px rgba(40,36,28,.04);
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{margin:0; -webkit-text-size-adjust:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--text); font-size:15px; line-height:1.55;}
  .wrap{max-width:880px; margin:0 auto; padding:16px 14px 40px;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}

  header{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px;}
  h1{font-size:21px; font-weight:700; margin:0; letter-spacing:-.01em;}
  .lastmod{font-size:11px; font-weight:400; color:var(--hint); white-space:nowrap;}
  .sub{font-size:12.5px; color:var(--muted); margin-top:2px;}
  .toolbar{display:flex; gap:7px; flex-wrap:wrap; align-items:center; justify-content:flex-end;}

  .btn{border:1px solid var(--line2); background:#fff; border-radius:9px; padding:9px 13px; font-size:13.5px; cursor:pointer; color:var(--text); transition:background .12s, border-color .12s; line-height:1;}
  .btn:hover{background:#efece4;}
  .btn:active{transform:translateY(.5px);}
  .btn.primary{border-color:var(--info-line); color:var(--info); background:var(--info-bg);}
  .btn.primary:hover{background:#dde9f3;}
  .btn.ok{border-color:#a9cd84; color:var(--ok); background:var(--ok-bg);}
  .btn.danger{border-color:var(--danger-line); color:var(--danger); background:var(--danger-bg);}
  .btn.sm{padding:6px 10px; font-size:12.5px;}

  .status{font-size:11.5px; padding:5px 9px; border-radius:7px; background:var(--card); border:1px solid var(--line); color:var(--muted); white-space:nowrap;}
  .status.live{color:var(--ok); border-color:#a9cd84; background:var(--ok-bg);}
  .status.live::before{content:"●"; margin-right:4px; font-size:9px; vertical-align:1px;}
  .status.off{color:var(--danger); border-color:var(--danger-line); background:var(--danger-bg);}

  /* 월 이동 바 */
  .monthbar{display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap;
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:8px 10px; box-shadow:var(--shadow);}
  .monthbar select{width:auto; margin:0; padding:8px 10px; font-weight:600; border-color:var(--line2);}
  .reqbtns{display:flex; gap:6px; margin-left:auto;}
  .reqbtn.on{background:var(--info); border-color:var(--info); color:#fff;}
  .reqbtn.on:hover{background:var(--info);}
  .navbtn{border:1px solid var(--line2); background:#fff; border-radius:8px; padding:8px 11px; font-size:14px; cursor:pointer; color:var(--text);}
  .navbtn:hover{background:#efece4;}

  /* 보기 전환(목록/달력) + 모드 세그먼트 */
  .controls{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:12px;}
  .modehint{font-size:13px; color:var(--info); font-weight:600; min-height:1px;}
  .seg{display:inline-flex; border:1px solid var(--line2); border-radius:9px; overflow:hidden; background:#fff;}
  .seg button{border:none; padding:9px 14px; font-size:13.5px; background:transparent; cursor:pointer; color:var(--muted); line-height:1;}
  .seg button.on{background:var(--info-bg); color:var(--info); font-weight:700;}
  .seg.view button.on{background:var(--text); color:#fff;}

  .hintbar{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:10px 13px; font-size:13px; color:var(--muted); margin-bottom:14px; box-shadow:var(--shadow);}
  .hintbar b{color:var(--text);}
  .adminbar{background:#fbf8ef; border:1px solid #ecdfb8;}

  /* ===== 달력(격자) 보기 ===== */
  .cal{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .wd{text-align:center; font-size:11.5px; font-weight:700; color:var(--muted); padding:4px 0;}
  .wd.s-sun{color:var(--hong);} .wd.s-sat{color:var(--info);}
  .cell{background:var(--card); border:1px solid var(--line); border-radius:9px; padding:6px; min-height:84px; font-size:11px; box-shadow:var(--shadow);}
  .cell.sun{background:var(--sun);} .cell.sat{background:var(--sat);}
  .cell.empty{background:transparent; border:1px dashed var(--line); box-shadow:none;}
  .daynum{font-weight:700; font-size:12px; margin-bottom:2px;}
  .svc{margin-top:5px; padding:4px; border-radius:6px; background:rgba(0,0,0,.015);}
  .svc.c-hong{background:var(--hong-bg);}
  .svc.c-nok{background:var(--nok-bg);}
  .svc.c-baek{background:var(--baek-bg);}
  .svc.c-bo{background:var(--bo-bg);}
  .mlabel{color:var(--info); font-weight:700; font-size:10.5px;}
  .time{font-weight:700;}
  .ctag{font-size:10px; font-weight:700; padding:0 3px; border-radius:3px; margin-left:1px;}
  .hong{color:var(--hong);} .nok{color:var(--nok);} .baek{color:var(--baek);} .bo{color:var(--bo);}
  .time.tedit{cursor:pointer; text-decoration:underline dotted; text-underline-offset:2px;}
  .role{margin-top:2px; display:flex; gap:4px; align-items:baseline;}
  .rolelbl{color:var(--muted); font-weight:600; flex-shrink:0;}
  .role-names{display:flex; flex-wrap:wrap; gap:1px 8px; align-items:baseline;}
  .name{display:inline-block; padding:1px 3px; margin:0; border-radius:4px; background:transparent; border:1px solid transparent; cursor:pointer; white-space:nowrap;}
  .name:hover{background:var(--info-bg); color:var(--info);}
  .name.picked{background:var(--info); color:#fff; font-weight:700;}
  .name.slotempty{color:var(--hint); border:1px dashed var(--line2); padding:0 4px;}
  .name.modded{color:#7a1416; font-weight:700;}
  .addmass{margin-top:5px; font-size:11px; color:var(--info); cursor:pointer; border:1px dashed var(--info-line); border-radius:6px; padding:3px 4px; text-align:center; background:var(--info-bg);}
  .addmass:hover{background:#dde9f3;}

  /* ===== 목록(카드) 보기 ===== */
  .list{display:flex; flex-direction:column; gap:9px;}
  .daycard{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);}
  .daycard.sun .dchead{background:var(--sun);} .daycard.sat .dchead{background:var(--sat);}
  .dchead{display:flex; align-items:baseline; gap:8px; padding:9px 13px; border-bottom:1px solid var(--line);}
  .dchead .dd{font-size:17px; font-weight:700;}
  .dchead .dw{font-size:12.5px; color:var(--muted); font-weight:600;}
  .dchead .dw.sun{color:var(--hong);} .dchead .dw.sat{color:var(--info);}
  .lsvc{display:flex; gap:11px; padding:11px 13px; border-top:1px solid var(--line);}
  .lsvc:first-of-type{border-top:none;}
  .lsvc-time{min-width:62px; flex-shrink:0;}
  .lsvc-time .lt{font-size:15px; font-weight:700;}
  .lsvc-time .lc{font-size:11px; font-weight:700; margin-top:1px;}
  .lsvc-time .ltedit{cursor:pointer; text-decoration:underline dotted; text-underline-offset:2px;}
  .lsvc-body{flex:1; min-width:0;}
  .lsvc-label{color:var(--info); font-weight:700; font-size:12.5px; margin-bottom:4px;}
  .lrole{display:flex; gap:6px; align-items:flex-start; margin:3px 0;}
  .lrole-lbl{font-size:12px; color:var(--muted); font-weight:700; min-width:16px; padding-top:4px;}
  .lrole-names{display:flex; flex-wrap:wrap; gap:5px;}
  .lname{display:inline-block; padding:5px 11px; border-radius:8px; background:#fff; border:1px solid var(--line2); cursor:pointer; font-size:14px;}
  .lname:hover{border-color:var(--info-line); background:var(--info-bg);}
  .lname.picked{background:var(--info); border-color:var(--info); color:#fff; font-weight:700;}
  .lname.slotempty{background:transparent; border:1px dashed var(--line2); color:var(--hint);}
  .lname.modded{color:#7a1416; border-color:#d8a9a9; font-weight:700;}
  .laddmass{margin:9px 13px; font-size:13px; color:var(--info); cursor:pointer; border:1px dashed var(--info-line); border-radius:8px; padding:7px; text-align:center; background:var(--info-bg);}
  .listempty{text-align:center; color:var(--hint); padding:30px 14px; font-size:14px;}

  section{margin-top:26px;}
  section h2{font-size:16px; font-weight:700; margin:0 0 10px; display:flex; align-items:baseline; gap:7px; flex-wrap:wrap;}
  section h2 .note{font-size:12px; color:var(--muted); font-weight:400;}
  .req{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:11px 13px; margin-bottom:8px; font-size:13.5px; box-shadow:var(--shadow);}
  .req .meta{color:var(--muted); font-size:12px;}
  .req .badge{display:inline-block; font-size:11px; padding:2px 9px; border-radius:20px; font-weight:700; margin-right:6px;}
  .b-wait{background:var(--warn-bg); color:var(--warn);}
  .b-ok{background:var(--ok-bg); color:var(--ok);}
  .b-no{background:var(--danger-bg); color:var(--danger);}
  .req .actions{margin-top:9px; display:flex; gap:7px;}

  .modal{position:fixed; inset:0; background:rgba(30,27,20,.5); display:none; align-items:flex-end; justify-content:center; padding:0; z-index:50;}
  .modal.show{display:flex;}
  .sheet{background:#fff; border-radius:16px 16px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom)); width:100%; max-width:480px; max-height:90vh; overflow:auto; box-shadow:0 -8px 30px rgba(0,0,0,.18);}
  .sheet h3{margin:0 0 14px; font-size:17px; font-weight:700;}
  label{font-size:13px; color:var(--muted); display:block; margin-bottom:5px;}
  input,select{width:100%; padding:11px 12px; border:1px solid var(--line2); border-radius:9px; font-size:16px; margin-bottom:13px; font-family:inherit; background:#fff; color:var(--text);}
  input:focus,select:focus{outline:2px solid var(--info-line); outline-offset:-1px; border-color:var(--info);}
  .swapbox{background:#f4f2ec; border-radius:9px; padding:11px; font-size:14px; margin-bottom:13px;}
  .right{display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap;}
  .empty-note{font-size:12.5px; color:var(--hint);}
  .footnote{margin-top:30px; font-size:11px; color:var(--hint); text-align:center;}
  /* 당월 배정 현황 */
  .stat-tools{display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; font-size:13px; color:var(--muted);}
  .stat-grade{font-size:12px; font-weight:700; color:var(--muted); margin:14px 0 6px;}
  .statrow{display:flex; align-items:center; gap:10px; padding:8px 11px; border:1px solid var(--line); border-radius:9px; background:var(--card); margin-bottom:6px; box-shadow:var(--shadow);}
  .statrow .nm{font-weight:600; min-width:74px;}
  .statrow .cnt{font-size:12px; font-weight:700; padding:2px 9px; border-radius:20px; background:var(--info-bg); color:var(--info); flex-shrink:0;}
  .statrow .cnt.zero{background:var(--warn-bg); color:var(--warn);}
  .statrow .det{font-size:12px; color:var(--muted); flex:1; min-width:0;}
  .statrow .excl{font-size:11px; color:var(--hint);}

  @media(min-width:620px){
    .modal{align-items:center; padding:14px;}
    .sheet{border-radius:16px;}
  }
  @media(max-width:380px){
    .wrap{padding:12px 10px 36px;}
    h1{font-size:19px;}
  }
  .print-title{display:none;}

  @media print{
    @page{ size:A4 landscape; margin:10mm; }
    body{background:#fff;}
    .wrap{max-width:none; padding:0;}
    /* 달력과 제목만 인쇄 */
    header, .monthbar, .controls, #adminBar, #hint, #modeHint,
    #listView, section, .footnote, .modal{ display:none !important; }
    #cal{ display:grid !important; gap:2px; }
    .print-title{display:block; font-size:18px; font-weight:700; margin-bottom:8px;}
    .print-title .pt-sub{display:block; font-size:11px; font-weight:400; color:#555; margin-top:2px;}
    .cell{ min-height:90px; box-shadow:none; break-inside:avoid; border-color:#ccc; }
    .svc{ background:#fff !important; }
    .name{ border:none; }
    .name.modded{ color:#7a1416 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .ctag, .time, .hong, .nok, .baek, .bo, .mlabel{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .cell.sun, .cell.sat{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>

  <header>
    <div>
      <h1 id="title">복사 배정표 <span id="lastMod" class="lastmod"></span></h1>
      <div class="sub">복사자모회 · 변경신청은 관리자 승인 후 반영됩니다</div>

  <div class="monthbar">
    <button id="prevM" class="navbtn" aria-label="이전 달">◀</button>

  <div id="adminBar" style="display:none;" class="hintbar adminbar">
    <b>관리자 모드</b> · 신청을 승인하면 배정표에 반영됩니다. 이름을 누르면 복사 수정, <u>미사 시간</u>을 누르면 전례색·제목·인원 수정.
    <div style="margin-top:9px; display:flex; gap:7px; flex-wrap:wrap;">
      <button id="newMonthBtn" class="btn sm">새 달 만들기</button>
      <button id="autoBtn" class="btn sm">한 달 자동배정</button>
      <button id="rosterBtn" class="btn sm">명단 관리 / 엑셀</button>
      <button id="adminOff" class="btn sm">관리자 해제</button>
    </div>
  </div>

  <div class="controls">
    <div id="modeHint" class="modehint"></div>
    <div class="seg view" id="viewSeg">
      <button id="vList">목록</button>
      <button id="vCal">달력</button>
    </div>
  </div>

  <div id="printTitle" class="print-title"></div>
  <div id="cal" class="cal"></div>
  <div id="listView" class="list"></div>

  <section>
    <h2>신청 현황 <span class="note">승인 대기 / 처리 완료 — 누구나 확인</span></h2>

  </section>

  <section>
    <h2>변경 기록 <span class="note">복사들의 교체·대타 신청 처리 내역</span></h2>
    <div id="logList"></div>
  </section>

  <section id="statSec" style="display:none;">
    <h2>당월 배정 현황 <span class="note">임원만 보임 · 복사별 배정 횟수와 미사</span></h2>
    <div id="statList"></div>
  </section>

  <section id="adminLogSec" style="display:none;">
    <h2>관리자 작업 기록 <span class="note">임원만 보임 · 공개 안 됨</span></h2>
    <div id="adminLogList"></div>
  </section>

  <div class="footnote">데이터는 Firebase에 안전하게 저장되며 모든 사용자에게 실시간 공유됩니다.</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script>
/* ============================================================
   복사단 배정 웹앱 — 단일 파일
   데이터 구조 (Firebase Realtime DB):
     /assign        : 배정표 (확정 명단)
     /requests/{id} : 변경신청 (대기/승인/거절)
     /logs/{id}     : 변경 기록
   ============================================================ */

const weekdays = ['일','월','화','수','목','금','토'];

/* ---- 기본 배정 시드 (업로드된 6월 배정표 기준) ---- */

  7:[{t:'9:00',c:'백',대:['김재윤','이예나'],소:['구현비','이지안4']},

  8:[{t:'6:30',c:'녹',대:['이윤섭'],소:['연주환']}],
  9:[{t:'19:30',c:'녹',대:['연주환'],소:['김아인']}],
  11:[{t:'19:30',c:'홍',대:['이지안6'],소:['이지안4']}],
  13:[{t:'17:00',c:'녹',label:'첫영성체',대:['이시윤','탁윤호'],소:['윤성현','조환희']}],
  14:[{t:'9:00',c:'녹',대:['최수인'],소:['김민준']},{t:'17:00',c:'녹',대:['이시호'],소:['이지효']}],
  15:[{t:'6:30',c:'녹',대:['이시윤'],소:['원준영']}],

/* ---- 요일 기준 미사 틀 자동생성 ----
   월:6:30(대1소1) / 화·목:19:30(대1소1) / 토:17:00(대2소2), 첫째주 토 10:00 성모신심(대1소1)
   일:9:00·17:00(대2소2). 빈 이름('')으로 자리만 생성. */
function blankNames(n){ return Array(n).fill(''); }
function buildMonthTemplate(y,m){
  const out={};
  const dim=daysInOf(y,m);
  let satCount=0;
  for(let day=1; day<=dim; day++){
    const dow=new Date(y,m-1,day).getDay(); // 0=일 ... 6=토
    const dayColor=litColor(y,m,day);
    const svcs=[];
    if(dow===1){ // 월
      svcs.push({t:'6:30',c:dayColor,label:'',대:blankNames(1),소:blankNames(1)});
    } else if(dow===2||dow===4){ // 화·목
      svcs.push({t:'19:30',c:dayColor,label:'',대:blankNames(1),소:blankNames(1)});
    } else if(dow===6){ // 토
      satCount++;
      if(satCount===1){ // 첫째 주 토요일: 성모신심(백)
        svcs.push({t:'10:00',c:'백',label:'성모신심',대:blankNames(1),소:blankNames(1)});
      }
      // 토요일 저녁(17:00)은 주일 미사를 앞당겨 지냄 → 다음날(주일) 색
      let sunColor=dayColor;
      if(day+1<=dim){ const sc=litColor(y,m,day+1); if(sc) sunColor=sc; }
      svcs.push({t:'17:00',c:sunColor,label:'',대:blankNames(2),소:blankNames(2)});
    } else if(dow===0){ // 일
      svcs.push({t:'9:00',c:dayColor,label:'',대:blankNames(2),소:blankNames(2)});
      svcs.push({t:'17:00',c:dayColor,label:'',대:blankNames(2),소:blankNames(2)});
    }
    if(svcs.length) out[day]=svcs;
  }
  return out;
}

  const mm=LITURGY_COLORS[String(m)];

/* 미사에 색이 지정돼 있으면 그대로, 없으면 그 날짜의 전례색으로 채움.
   토요일 저녁(시간이 오후/저녁)은 다음날(주일) 색을 적용. */
function svcColor(s, day){
  if(s.c) return s.c;
  const dim=daysInMonth();
  const dow=(firstDow()+day-1)%7;
  let c=litColor(curY,curM,day);
  if(dow===6){ // 토요일: 저녁 미사면 다음날 색
    const t=(s.t||'');
    const hr=parseInt(t,10)||0;
    const isEvening = hr>=15 || t.indexOf('오후')>=0; // 15시 이후를 저녁으로 간주
    if(isEvening && day+1<=dim){ const nc=litColor(curY,curM,day+1); if(nc) c=nc; }
  }
  return c||'';
}

      monthsIndex[monthKey(START_YEAR,START_MONTH)]=true;
      loadMonth(curY,curM); buildMonthSelect();
      return;
    }
    firebase.initializeApp(firebaseConfig);
    db=firebase.database();
    online=true;
    conn.textContent='실시간 연결됨'; conn.className='status live';

    // 명단(전역)
    const rRef=db.ref('roster');
    rRef.once('value').then(s=>{ if(!s.exists()){ rRef.set(SEED_ROSTER); } });
    rRef.on('value', s=>{ if(s.exists()){ rosterRecords=(s.val()||[]).filter(Boolean); } });
    db.ref('vacation').on('value', s=>{ vacationTable=s.val()||{}; });

    // 월 목록 인덱스
    db.ref('months').on('value', s=>{
      monthsIndex={};
      const v=s.val()||{};
      Object.keys(v).forEach(k=>monthsIndex[k]=true);
      // 최초 진입 시 6월이 없으면 시드 생성
      const startK=monthKey(START_YEAR,START_MONTH);
      if(!monthsIndex[startK] && !seedTried){
        seedTried=true;
        db.ref('months/'+startK+'/assign').set(SEED);
        return; // months 갱신되면 다시 들어옴
      }
      buildMonthSelect();
      if(!subscribedMonth) loadMonth(curY,curM);
    });
  }catch(e){
    conn.textContent='연결 오류 — 데모 모드'; conn.className='status off';
    online=false; renderAll();
  }
}

function loadMonth(y,m){
  curY=y; curM=m;

  subscribedMonth=k;
  pick=null;
  updateTitle();
  if(!online){
    const md=demoMonths[k]||{assign:{},requests:{},logs:{}};
    assign=normalize(md.assign||{}); if(md.updated) assign.__updated=md.updated;
    requests=md.requests||{}; logs=md.logs||{};
    renderAll(); updateMonthState(); return;
  }
  // 기존 구독 해제
  monthListeners.forEach(fn=>fn());
  monthListeners=[];
  const base='months/'+k;
  const aRef=db.ref(base+'/assign');
  const aCb=aRef.on('value', s=>{ const u=assign&&assign.__updated; assign = s.exists()?normalize(s.val()):{}; if(u)assign.__updated=u; renderBoard(); updateMonthState(); });
  const uRef=db.ref(base+'/updated');
  const uCb=uRef.on('value', s=>{ if(assign) assign.__updated=s.val()||null; renderLastMod(); });
  const reqRef=db.ref(base+'/requests');
  const reqCb=reqRef.on('value', s=>{ requests=s.val()||{}; renderReqs(); });
  const logRef=db.ref(base+'/logs');
  const logCb=logRef.on('value', s=>{ logs=s.val()||{}; renderLogs(); });
  const alRef=db.ref(base+'/adminlogs');
  const alCb=alRef.on('value', s=>{ adminLogs=s.val()||{}; renderAdminLogs(); });
  monthListeners=[ ()=>aRef.off('value',aCb), ()=>uRef.off('value',uCb), ()=>reqRef.off('value',reqCb), ()=>logRef.off('value',logCb), ()=>alRef.off('value',alCb) ];
}

/* Firebase는 빈 배열을 누락시키므로 정규화 */
function normalize(a){
  const out={};
  Object.keys(a||{}).forEach(d=>{
    out[d]=(a[d]||[]).map(s=>({t:s.t,c:s.c||'',label:s.label||'',대:s.대||[],소:s.소||[],mod:s.mod||null}));

  return out;
}

    const cell=document.createElement('div');
    cell.className='cell'+(dow===0?' sun':dow===6?' sat':'');
    let html=`<div class="daynum">${day}</div>`;
    (assign[day]||[]).forEach((s,si)=>{
      const col=svcColor(s,day);
      const cc=cTag[col]||'';
      html+=`<div class="svc ${cc}">`;
      if(s.label) html+=`<div class="mlabel">${s.label}</div>`;
      html+=`<span class="time ${colorCls[col]||''}${admin?' tedit':''}" data-td="${day}" data-ts="${si}">${s.t}${col?' <span class="ctag '+(colorCls[col])+'">'+col+'</span>':''}</span>`;
      ['대','소'].forEach(role=>{
        const arr=s[role]||[];
        if(arr.length){
          html+=`<div class="role"><span class="rolelbl">${role}</span><span class="role-names">`;
          arr.forEach((nm,ni)=>{
            const on=pick&&pick.d==day&&pick.s==si&&pick.r==role&&pick.i==ni;
            const empty = !nm;
            const md = s.mod&&s.mod[role+ni];
            html+=`<span class="name${on?' picked':''}${empty?' slotempty':''}${md?' modded':''}" data-d="${day}" data-s="${si}" data-r="${role}" data-i="${ni}">${nm||'＋'}</span>`;
          });
          html+='</span></div>';
        }
      });
      html+='</div>';
    });
    if(admin){ html+=`<div class="addmass" data-addd="${day}">＋ 미사</div>`; }
    cell.innerHTML=html;
    cal.appendChild(cell);
  }
  bindCellHandlers(cal);
  setHint();
}

/* ---------- 목록(카드) 렌더 ---------- */
function renderList(){
  listView.innerHTML='';
  const fd=firstDow(), dim=daysInMonth();
  let any=false;
  for(let day=1;day<=dim;day++){
    const svcs=assign[day]||[];
    if(!svcs.length && !admin) continue;       // 어머니/학생: 배정 있는 날만
    if(!svcs.length && admin){ /* 관리자에겐 빈 날도 +미사 위해 표시 생략 가능, 여기선 생략 */ continue; }
    any=true;
    const dow=(fd+day-1)%7;
    const card=document.createElement('div');
    card.className='daycard'+(dow===0?' sun':dow===6?' sat':'');
    let html=`<div class="dchead"><span class="dd">${day}</span><span class="dw ${dow===0?'sun':dow===6?'sat':''}">${weekdays[dow]}요일</span></div>`;
    svcs.forEach((s,si)=>{
      const col=svcColor(s,day);
      const cc=cTag[col]||'';
      html+=`<div class="lsvc ${cc}">`;
      html+=`<div class="lsvc-time"><div class="lt ${admin?'ltedit':''}" data-td="${day}" data-ts="${si}">${s.t}</div>`;
      if(col) html+=`<div class="lc ${colorCls[col]}">${col}</div>`;
      html+=`</div><div class="lsvc-body">`;
      if(s.label) html+=`<div class="lsvc-label">${s.label}</div>`;
      ['대','소'].forEach(role=>{
        const arr=s[role]||[];
        if(arr.length){
          html+=`<div class="lrole"><span class="lrole-lbl">${role}</span><div class="lrole-names">`;
          arr.forEach((nm,ni)=>{
            const on=pick&&pick.d==day&&pick.s==si&&pick.r==role&&pick.i==ni;
            const empty=!nm;
            const md = s.mod&&s.mod[role+ni];
            html+=`<span class="lname${on?' picked':''}${empty?' slotempty':''}${md?' modded':''}" data-d="${day}" data-s="${si}" data-r="${role}" data-i="${ni}">${nm||'＋ 빈자리'}</span>`;
          });
          html+='</div></div>';
        }
      });
      html+='</div></div>';
    });
    if(admin){ html+=`<div class="laddmass" data-addd="${day}">＋ 이 날 미사 추가</div>`; }
    card.innerHTML=html;
    listView.appendChild(card);
  }
  if(!any){
    listView.innerHTML=`<div class="listempty">이 달은 아직 배정이 없습니다.${admin?'<br>관리자 메뉴의 <b>새 달 만들기</b>로 시작하세요.':''}</div>`;
  }
  bindCellHandlers(listView);
  setHint();
}

/* 공통: 이름/시간/추가 핸들러 바인딩 (격자·목록 공용) */
function bindCellHandlers(root){
  root.querySelectorAll('.name,.lname').forEach(el=>el.onclick=()=>onName(el.dataset));
  if(admin){
    root.querySelectorAll('.tedit,.ltedit').forEach(el=>el.onclick=()=>editColor(+el.dataset.td,+el.dataset.ts));
    root.querySelectorAll('.addmass,.laddmass').forEach(el=>el.onclick=()=>addMass(+el.dataset.addd));
  }
}

function setHint(){
  const h=document.getElementById('modeHint');
  if(!h) return;
  if(admin){ h.innerHTML=''; return; }
  if(mode==='view'){ h.innerHTML=''; return; }
  if(mode==='swap'){
    h.innerHTML = pick
      ? `<b>${pick.name}</b> 선택됨 — 맞바꿀 상대를 누르세요`
      : '맞교환: 내 복사 → 바꿀 상대 순서로 누르세요';
  } else {
    h.innerHTML='대타: 못 나가는 복사를 누르세요';
  }
}

/* ---------- 이름 클릭 처리 ---------- */
function slot(d){return assign[d];}
function label(d,s){return `${d}일 ${assign[d][s].t}`;}
function onName(ds){
  const d=+ds.d,s=+ds.s,r=ds.r,i=+ds.i,name=assign[d][s][r][i];
  if(admin) return adminEdit(d,s,r,i,name);
  if(!name){ return; }  // 빈자리는 어머니/학생이 누를 수 없음 (배정 전)
  if(mode==='view'){ setHint(); return; }
  if(mode==='sub') return subReq(d,s,r,i,name);
  // swap
  if(!pick){ pick={d,s,r,i,name}; renderBoard(); return; }
  if(pick.d==d&&pick.s==s&&pick.r==r&&pick.i==i){ pick=null; renderBoard(); return; }
  confirmSwap(pick,{d,s,r,i,name});
}

/* ---------- 모달 ---------- */
const modal=document.getElementById('modal'),mTitle=document.getElementById('mTitle'),mBody=document.getElementById('mBody');
const openM=()=>modal.classList.add('show'), closeM=()=>modal.classList.remove('show');
modal.onclick=e=>{ if(e.target===modal) closeM(); };

function confirmSwap(a,b){
  mTitle.textContent='1:1 맞교환 신청';
  mBody.innerHTML=`
    <div class="swapbox">
      <b>${a.name}</b> (${label(a.d,a.s)} ${a.r})<br>
      <span style="color:var(--info)">↕ 맞바꿈</span><br>
      <b>${b.name}</b> (${label(b.d,b.s)} ${b.r})
    </div>
    <label>신청자(어머니) 이름</label>
    <input id="reqBy" placeholder="예: 홍길동 모친">
    <label>사유 (선택)</label>
    <input id="reason" placeholder="예: 가족 일정">
    <div class="right">
      <button class="btn" onclick="closeM()">취소</button>
      <button class="btn primary" id="ok">신청하기</button>
    </div>`;
  openM();
  document.getElementById('ok').onclick=()=>{
    const who=val('reqBy')||'(이름없음)', rs=val('reason');
    pushReq({kind:'swap', who, reason:rs,
      a:{d:a.d,s:a.s,r:a.r,i:a.i,name:a.name},
      b:{d:b.d,s:b.s,r:b.r,i:b.i,name:b.name},
      desc:`${a.name}(${label(a.d,a.s)} ${a.r}) ↔ ${b.name}(${label(b.d,b.s)} ${b.r})`});
    pick=null; closeM(); renderBoard();
    toast('맞교환 신청이 접수되었습니다. 관리자 승인 후 반영됩니다.');
  };
}

function subReq(d,s,r,i,name){
  mTitle.textContent='대타 신청';

    <div class="swapbox">${label(d,s)} ${r}) <b>${name}</b> 대신 설 사람</div>
    <label>대타 복사</label>
    <select id="newName"><option value="">— 선택 —</option>${opts}</select>
    <label>신청자(어머니) 이름</label>
    <input id="reqBy" placeholder="예: 홍길동 모친">
    <label>사유 (선택)</label>
    <input id="reason" placeholder="예: 갑작스런 사정">
    <div class="right">
      <button class="btn" onclick="closeM()">취소</button>
      <button class="btn primary" id="ok">신청하기</button>
    </div>`;
  openM();
  document.getElementById('ok').onclick=()=>{

function adminEdit(d,s,r,i,cur){
  mTitle.textContent='복사 배정 수정';
  const opts=`<option value="" ${cur===''?'selected':''}>— 비우기 —</option>`+
    rosterNames().map(n=>`<option ${n===cur?'selected':''}>${n}</option>`).join('');

    <div class="swapbox">${label(d,s)} ${r}) ${cur?'<b>'+cur+'</b>':'(빈자리)'}</div>
    <label>복사 (비우려면 '— 비우기 —')</label>

    <label>임원 이름</label>
    <input id="adminName" placeholder="예: 김임원">
    <div class="right">
      <button class="btn" onclick="closeM()">취소</button>
      <button class="btn primary" id="ok">저장</button>

function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}

/* ---------- 관리자: 미사 편집 (시간·색·제목·인원·삭제) ---------- */
function editColor(d,s){
  const svc=assign[d][s]; if(!svc) return;
  mTitle.textContent='미사 편집';
  const cur=svc.c||'녹';
  const colors=[['녹','연중'],['백','대축일·축일'],['홍','순교·성령·사도'],['보','대림·사순']];
  const colBtns=colors.map(([c,desc])=>
    `<option value="${c}" ${cur===c?'selected':''}>${c} (${desc})</option>`).join('');
  const nDae=(svc.대||[]).length, nSo=(svc.소||[]).length;
  const numOpts=(sel)=>Array.from({length:9},(_,i)=>`<option value="${i}" ${i===sel?'selected':''}>${i}명</option>`).join('');
  mBody.innerHTML=`
    <div class="swapbox">${d}일 미사 편집</div>
    <label>미사 시간</label>
    <input id="timeInp" value="${svc.t||''}" placeholder="예: 9:00, 19:30">
    <label>전례색</label>
    <select id="colSel">${colBtns}</select>
    <label>미사 제목 / 행사 이름 (선택)</label>
    <input id="lblInp" value="${svc.label||''}" placeholder="예: 성시간, 찬미미사, 첫영성체">
    <div style="display:flex; gap:10px;">
      <div style="flex:1;"><label>대 인원</label><select id="nDae">${numOpts(nDae)}</select></div>
      <div style="flex:1;"><label>소 인원</label><select id="nSo">${numOpts(nSo)}</select></div>
    </div>
    <div style="margin:-4px 0 12px;">
      <button class="btn" style="padding:5px 10px; font-size:12px;" onclick="setCnt('nDae','nSo',1,1)">평일(1·1)</button>
      <button class="btn" style="padding:5px 10px; font-size:12px;" onclick="setCnt('nDae','nSo',2,2)">주일(2·2)</button>
      <button class="btn" style="padding:5px 10px; font-size:12px;" onclick="setCnt('nDae','nSo',4,4)">대축일(4·4)</button>
    </div>
    <div style="font-size:12px; color:var(--hint); margin-bottom:10px;">인원을 줄이면 뒤쪽 자리부터 비워집니다. 늘리면 빈자리가 추가됩니다(최대 8명).</div>
    <label>임원 이름</label>
    <input id="adminName" placeholder="예: 김임원">
    <div class="right" style="flex-wrap:wrap;">
      <button class="btn danger" id="delMass" style="margin-right:auto;">이 미사 삭제</button>
      <button class="btn" id="clearNames">이름 비우기</button>
      <button class="btn" onclick="closeM()">취소</button>
      <button class="btn primary" id="ok">저장</button>
    </div>`;
  openM();

  document.getElementById('clearNames').onclick=()=>{
    const an=val('adminName')||'임원';
    assign[d][s].대=(svc.대||[]).map(()=>'');
    assign[d][s].소=(svc.소||[]).map(()=>'');
    saveAssign();
    adminLog(`[미사수정] ${an} · ${d}일 ${svc.t} 배정 이름 비움`);
    closeM();
  };

  document.getElementById('delMass').onclick=()=>{
    if(!confirm(`${d}일 ${svc.t} 미사를 삭제할까요? (배정된 복사도 함께 사라집니다)`)) return;
    const an=val('adminName')||'임원';
    assign[d].splice(s,1);
    if(assign[d].length===0) delete assign[d];
    saveAssign();
    adminLog(`[미사삭제] ${an} · ${d}일 ${svc.t}${svc.label?' ('+svc.label+')':''}`);
    closeM();
  };

  document.getElementById('ok').onclick=()=>{
    const nc=val('colSel'), nl=val('lblInp'), nt=val('timeInp'), an=val('adminName')||'임원';
    const nd=+val('nDae'), ns=+val('nSo');
    const oc=svc.c||'녹', ol=svc.label||'', ot=svc.t||'';
    if(nt==='') { alert('미사 시간을 입력하세요.'); return; }
    // 인원 조정: 기존 이름 유지, 늘리면 빈칸 추가, 줄이면 뒤에서 제거
    function resize(arr,n){ arr=arr||[]; const out=arr.slice(0,n); while(out.length<n) out.push(''); return out; }
    const newDae=resize(svc.대,nd), newSo=resize(svc.소,ns);
    assign[d][s].t=nt;
    assign[d][s].c=(nc==='녹'?'':nc);
    assign[d][s].label=nl;
    assign[d][s].대=newDae;
    assign[d][s].소=newSo;
    saveAssign();
    let chg=[];
    if(nt!==ot) chg.push(`시간 ${ot}→${nt}`);
    if(nc!==oc) chg.push(`색 ${oc}→${nc}`);
    if(nl!==ol) chg.push(`제목 "${ol||'없음'}"→"${nl||'없음'}"`);
    if(nd!==(svc.대||[]).length||ns!==(svc.소||[]).length) chg.push(`인원 대${(svc.대||[]).length}·소${(svc.소||[]).length}→대${nd}·소${ns}`);
    if(chg.length) adminLog(`[미사수정] ${an} · ${d}일 ${nt} ${chg.join(', ')}`);
    closeM();
  };
}
function setCnt(idA,idB,a,b){ document.getElementById(idA).value=a; document.getElementById(idB).value=b; }

/* ---------- 관리자: 그 날에 미사 추가 ---------- */
function addMass(d){
  const an=prompt('미사를 추가하는 임원 이름','임원'); if(an===null) return;
  if(!assign[d]) assign[d]=[];
  assign[d].push({t:'9:00',c:'',label:'',대:[''],소:['']});
  saveAssign();
  adminLog(`[미사추가] ${an} · ${d}일 새 미사`);
  // 바로 편집 창 열기
  editColor(d, assign[d].length-1);
}

/* ---------- 신청 현황 ---------- */
function renderReqs(){
  const box=document.getElementById('reqList');
  const ids=Object.keys(requests);
  if(!ids.length){ box.innerHTML='<div class="empty-note">접수된 신청이 없습니다.</div>'; return; }
  // 승인 대기를 위로, 처리 완료(승인/거절)는 아래로. 각 그룹 안에서는 최신 먼저
  ids.sort((x,y)=>{
    const pw=requests[x].status==='wait'?0:1;
    const pwy=requests[y].status==='wait'?0:1;
    if(pw!==pwy) return pw-pwy;
    return x<y?1:-1;
  });
  box.innerHTML='';
  ids.forEach(id=>{
    const r=requests[id];
    const badge = r.status==='wait'?'<span class="badge b-wait">승인 대기</span>'
      : r.status==='ok'?'<span class="badge b-ok">승인 완료</span>'
      : r.status==='cancel'?'<span class="badge b-no">신청 취소됨</span>'
      : '<span class="badge b-no">거절됨</span>';
    let actions='';
    if(r.status==='wait'){
      const adminBtns = admin
        ? `<button class="btn ok" onclick="approve('${id}')">승인 → 반영</button>
           <button class="btn danger" onclick="reject('${id}')">거절</button>` : '';
      actions=`<div class="actions">
        ${adminBtns}
        <button class="btn" onclick="cancelReq('${id}')">신청 취소</button></div>`;
    }
    box.innerHTML+=`<div class="req">
      ${badge}<b>${r.kind==='swap'?'1:1 맞교환':'대타'}</b>
      <div style="margin:4px 0;">${r.desc}</div>
      <div class="meta">신청: ${r.who} · ${r.ts}${r.reason?' · 사유: '+r.reason:''}${r.handledBy?' · 처리: '+r.handledBy+' ('+r.handledTs+')':''}</div>
      ${actions}
    </div>`;
  });
}

function markMod(d,s,role,i){
  const svc=assign[d][s]; if(!svc) return;
  if(!svc.mod) svc.mod={};
  svc.mod[role+i]=true;
}
function approve(id){
  const r=requests[id]; if(!r) return;
  const an=prompt('승인 처리하는 임원 이름을 입력하세요','임원'); if(an===null) return;
  // 반영
  if(r.kind==='swap'){
    const a=r.a,b=r.b;
    if(assign[a.d]&&assign[a.d][a.s]&&assign[b.d]&&assign[b.d][b.s]){
      assign[a.d][a.s][a.r][a.i]=b.name;
      assign[b.d][b.s][b.r][b.i]=a.name;
      markMod(a.d,a.s,a.r,a.i); markMod(b.d,b.s,b.r,b.i);
      saveAssign();
    }
  } else {
    const a=r.a;
    if(assign[a.d]&&assign[a.d][a.s]) { assign[a.d][a.s][a.r][a.i]=r.newName; markMod(a.d,a.s,a.r,a.i); saveAssign(); }
  }
  const upd={status:'ok', handledBy:an||'임원', handledTs:nowStr()};
  updateReqStatus(id,upd);
  pushLog(`[승인] ${an||'임원'} · ${r.desc} (신청: ${r.who})`);
}
function reject(id){
  const r=requests[id]; if(!r) return;
  const an=prompt('거절 처리하는 임원 이름을 입력하세요','임원'); if(an===null) return;
  const upd={status:'no', handledBy:an||'임원', handledTs:nowStr()};
  updateReqStatus(id,upd);
  pushLog(`[거절] ${an||'임원'} · ${r.desc} (신청: ${r.who})`);
}
function cancelReq(id){
  const r=requests[id]; if(!r||r.status!=='wait') return;
  const who=prompt('신청을 취소하시는 분의 이름을 입력하세요','');
  if(who===null) return;   // 취소창 자체를 닫음
  if(!confirm(`이 신청을 취소할까요?\n${r.desc}`)) return;
  const upd={status:'cancel', handledBy:(who.trim()||'신청자'), handledTs:nowStr()};
  updateReqStatus(id,upd);
  pushLog(`[신청취소] ${who.trim()||'신청자'} · ${r.desc} (원 신청: ${r.who})`);
}

/* ---------- 변경 기록 ---------- */
function renderLogs(){
  const box=document.getElementById('logList');
  const ids=Object.keys(logs);
  if(!ids.length){ box.innerHTML='<div class="empty-note">기록이 없습니다.</div>'; return; }
  ids.sort((x,y)=>x<y?1:-1);
  box.innerHTML='';
  ids.forEach(id=>{const l=logs[id];
    box.innerHTML+=`<div class="req"><span class="meta">${l.ts}</span> · ${l.text}</div>`;});
}
function renderAdminLogs(){
  const sec=document.getElementById('adminLogSec');

/* ---------- 당월 배정 현황 (복사별) ---------- */
function renderStats(){
  const sec=document.getElementById('statSec');
  const box=document.getElementById('statList');
  if(!sec||!box) return;
  sec.style.display = admin ? 'block' : 'none';
  if(!admin) return;

  // 복사별 배정 수집: { name: [{day, t, role}] }
  const byName={};
  rosterRecords.forEach(r=>{ byName[r.name]=[]; });
  const dim=daysInMonth();
  for(let day=1; day<=dim; day++){
    (assign[day]||[]).forEach(s=>{
      ['대','소'].forEach(role=>{
        (s[role]||[]).forEach(nm=>{
          if(!nm) return;
          if(!byName[nm]) byName[nm]=[]; // 명단에 없는 이름도 표시
          byName[nm].push({day, t:s.t, role});
        });
      });
    });
  }
  const counts=Object.values(byName).map(a=>a.length);
  const total=counts.reduce((a,b)=>a+b,0);
  const assignedPpl=counts.filter(c=>c>0).length;
  const maxC=counts.length?Math.max(...counts):0, minC=counts.length?Math.min(...counts):0;

  // 학년 순으로 정렬해 그룹 표시
  const recs=[...rosterRecords].sort((a,b)=> gradeRank(a.grade)-gradeRank(b.grade) || a.name.localeCompare(b.name,'ko'));
  // 명단에 없지만 배정된 이름(예: 옛 이름)도 뒤에 추가
  const extra=Object.keys(byName).filter(n=>!rosterRecords.find(r=>r.name===n));

  let html=`<div class="stat-tools">총 배정 ${total}회 · 배정된 복사 ${assignedPpl}명 · 1인 ${minC}~${maxC}회</div>`;
  let lastGrade=null;
  recs.forEach(r=>{
    if(r.grade!==lastGrade){ lastGrade=r.grade; html+=`<div class="stat-grade">${r.grade||'기타'}</div>`; }
    const arr=byName[r.name]||[];
    const det = arr.length
      ? arr.map(a=>`${a.day}일 ${a.t}(${a.role})`).join(', ')
      : (r.excluded?'<span class="excl">배정 제외</span>':'<span class="excl">배정 없음</span>');
    html+=`<div class="statrow">
      <span class="nm">${r.name}</span>
      <span class="cnt${arr.length?'':' zero'}">${arr.length}회</span>
      <span class="det">${det}</span>
    </div>`;
  });
  if(extra.length){
    html+=`<div class="stat-grade">명단 외 이름</div>`;
    extra.forEach(n=>{
      const arr=byName[n];
      html+=`<div class="statrow"><span class="nm">${n}</span><span class="cnt">${arr.length}회</span>
        <span class="det">${arr.map(a=>`${a.day}일 ${a.t}(${a.role})`).join(', ')}</span></div>`;
    });
  }
  box.innerHTML=html;
}

function handleRosterFile(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const parsed=parseRosterRows(rows);
      if(!parsed.length){ alert('명단을 읽지 못했습니다. 열 순서(학년·성명·학교·비고)를 확인하세요.'); return; }
      previewRoster(parsed);
    }catch(err){ alert('엑셀을 읽는 중 오류가 발생했습니다: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

/* 엑셀 행 파싱: 헤더에서 성명·학년·학교 + 자격열(성시간/신심/새벽/평일/어린이/주일/방학) 인식.
   비고의 '대대 제외'·'배정 제외' 처리. 오른쪽 방학기간 표도 함께 읽음. */
const CAP_KEYS=['성시간','신심','새벽','평일','어린이','주일','방학'];

function parseRosterRows(rows){
  if(!rows||!rows.length) return [];
  // 헤더 행 탐지
  let headerIdx=-1, col={};
  for(let i=0;i<Math.min(rows.length,5);i++){
    const r=rows[i].map(x=>String(x).trim());
    const ni=r.findIndex(x=>x==='성명'||x==='이름');
    if(ni>=0){ headerIdx=i;
      col.name=ni;
      col.grade=r.findIndex(x=>x==='학년');
      col.school=r.findIndex(x=>x==='학교');
      col.note=r.findIndex(x=>x==='비고');
      // 자격 열 위치
      col.caps={};
      CAP_KEYS.forEach(k=>{
        let idx=r.findIndex(x=>x===k);
        if(k==='주일') idx=r.findIndex(x=>x.indexOf('주일')>=0);   // '주일9/5시'
        col.caps[k]=idx;
      });
      // 방학기간 표 헤더('방학기간') 위치
      col.vac=r.findIndex(x=>x.indexOf('방학기간')>=0);
      break;
    }
  }
  const out=[];
  const seen=new Set();
  const start = headerIdx>=0 ? headerIdx+1 : 0;
  const gi = headerIdx>=0?col.grade:1;
  const ni = headerIdx>=0?col.name:2;
  const si = headerIdx>=0?col.school:3;
  const noteI = headerIdx>=0?col.note:-1;

  // 방학기간 표 읽기 (방학기간 헤더 열 = 학교명, 그 다음 열 = 기간)
  parsedVacation={};
  if(headerIdx>=0 && col.vac>=0){
    for(let i=headerIdx+1;i<rows.length;i++){
      const r=rows[i].map(x=>String(x).trim());
      const key=r[col.vac]||'', valv=r[col.vac+1]||'';
      if(key && /\d+\/\d+\s*-\s*\d+\/\d+/.test(valv)) parsedVacation[key]=valv; // 'M/D-M/D' 형태만
    }
  }

  for(let i=start;i<rows.length;i++){
    const r=rows[i].map(x=>String(x).trim());
    const name=(ni>=0?r[ni]:'')||'';
    if(!name || name==='성명' || name==='이름') continue;
    const grade=(gi>=0?r[gi]:'')||'';
    const school=(si>=0?r[si]:'')||'';
    const note=(noteI>=0?r[noteI]:'')||'';
    const rest=r.join(' ');
    const noDD=/대대\s*제외/.test(note)||/대대\s*제외/.test(rest);
    const excluded=/배정\s*제외/.test(note)||/배정\s*제외/.test(rest);
    // 자격
    let cap=null;
    if(headerIdx>=0 && col.caps){
      cap={};
      CAP_KEYS.forEach(k=>{ const idx=col.caps[k]; cap[k]= (idx>=0 && String(r[idx]).trim()==='1'); });
    }
    if(seen.has(name)) continue;
    seen.add(name);
    out.push({grade,name,school,noDD,excluded,cap});
  }
  return out;
}

function previewRoster(parsed){
  const oldNames=new Set(rosterNames());
  const newNames=new Set(parsed.map(r=>r.name));
  const added=parsed.filter(r=>!oldNames.has(r.name)).map(r=>r.name);
  const removed=[...oldNames].filter(n=>!newNames.has(n));

  const hasCap=parsed.some(r=>r.cap);

    </div>
    <div style="font-size:13px; margin-bottom:8px;">

    </div>

      <b style="color:var(--danger)">졸업·삭제 (${removed.length}명):</b> ${list(removed)}

    ${hasCap?`<div style="font-size:12px; color:var(--muted); background:#f4f2ec; padding:8px; border-radius:8px; margin-bottom:10px;">
      자격 정보 인식됨 · 새벽미사 가능 ${dawnCnt}명${vacCnt?` · 방학기간 ${vacCnt}개 학교`:''}<br>자동배정이 이 자격(성시간·새벽 등)을 지킵니다.
    </div>`:''}
    ${removed.some(n=>nameInAssign(n)) ? `<div style="font-size:12px; color:var(--warn); background:var(--warn-bg); padding:8px; border-radius:8px; margin-bottom:12px;">
      ⚠️ 삭제 대상 중 <b>${removed.filter(nameInAssign).join(', ')}</b> 은(는) 현재 배정표에 들어 있습니다. 명단 갱신 후 해당 배정은 직접 교체해 주세요.
    </div>`:''}
    <label>처리 임원 이름</label>
    <input id="rAdmin" placeholder="예: 김임원">
    <div class="right">
      <button class="btn" onclick="openRoster()">취소</button>
      <button class="btn primary" id="rApply">이 명단으로 갱신</button>
    </div>`;
  openM();
  document.getElementById('rApply').onclick=()=>{
    const an=val('rAdmin')||'임원';
    parsed.sort((a,b)=> gradeRank(a.grade)-gradeRank(b.grade) || a.name.localeCompare(b.name,'ko'));
    saveRoster(parsed, parsedVacation);
    adminLog(`[명단갱신] ${an} · ${oldNames.size}명 → ${parsed.length}명 (신입 ${added.length}, 졸업·삭제 ${removed.length}, 배정제외 ${excluded.length})`);
    closeM();
    toast(`명단을 갱신했습니다. (${parsed.length}명)`);
  };
}
function nameInAssign(n){
  for(const d in assign) for(const s of assign[d]) for(const role of ['대','소']) if((s[role]||[]).includes(n)) return true;
  return false;
}

function downloadRosterTemplate(){
  const header=['번호','학년','성명','학교',...CAP_KEYS,'비고','','방학기간',''];
  const data=[header];
  // 명단 본문
  let no=0, lastGrade='';
  rosterRecords.forEach(r=>{
    if(r.grade!==lastGrade){ no=0; lastGrade=r.grade; }
    no++;
    const caps=CAP_KEYS.map(k=> (r.cap&&r.cap[k])?'1':'');
    const note = r.excluded?'배정 제외':(r.noDD?'대대 제외':'');
    data.push([no,r.grade,r.name,r.school||'',...caps,note,'','','']);
  });
  // 방학기간 표를 오른쪽(N,O열 = index 13,14)에 채워넣기
  const vacEntries=Object.entries(vacationTable||{});
  vacEntries.forEach(([school,period],i)=>{
    const row=data[i+1]; if(!row) return;
    row[13]=school; row[14]=period;
  });
  const ws=XLSX.utils.aoa_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'명단');
  XLSX.writeFile(wb,'복사단명단_양식.xlsx');
}

/* ---------- 한 달 자동배정 ---------- */
/* 규칙 요약:
   - 기존 틀(SEED의 미사 시간/요일/인원수)을 그대로 사용, 자리에 들어갈 사람만 자동 배정
   - 일요일(9:00/17:00)의 '대' 자리 = 대대(최고 레벨): '대대 제외' 학생 배정 안 함
   - 같은 날 같은 사람 중복 배정 금지
   - 이번 달 배정 횟수가 가장 적은 사람 우선 + 동률이면 랜덤 → 대략 균등 + 매번 다르게
*/
function isSunday(day){ return (firstDow()+day-1)%7===0; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* 미사가 요구하는 자격 키를 판단 (명단 자격열과 매칭) */
function massCapKey(s, day){
  const label=s.label||'', t=s.t||'';
  if(/성시간/.test(label)) return '성시간';
  if(/성모신심|신심/.test(label)) return '신심';
  if(/어린이/.test(label)) return '어린이';
  const dow=(firstDow()+day-1)%7;
  const hr=parseInt(t,10)||0;
  if(dow===0) return '주일';                 // 일요일
  if(dow===6 && hr>=15) return '주일';        // 토요일 저녁(주일 전야)
  if(hr>0 && hr<9) return '새벽';             // 이른 아침(6:30 등) = 새벽
  if((dow>=1&&dow<=5) && hr>=15) return '평일'; // 평일 저녁
  return '';   // 매칭 안 되면 자격 제한 없음
}
/* 사람이 해당 자격을 충족하는지. cap 정보 없으면(구버전) 모두 허용 */
function canServe(name, capKey){
  if(!capKey) return true;
  const rec=rosterRecords.find(r=>r.name===name);
  if(!rec || !rec.cap) return true;   // 자격 데이터 없으면 제한 안 함
  return !!rec.cap[capKey];
}

function buildAutoAssign(){
  // 배정 제외 인원은 후보에서 제거
  const names=rosterRecords.filter(r=>!r.excluded).map(r=>r.name);
  if(names.length<2) return null;
  const tmpl=assign;   // 현재 보고 있는 달의 틀(시간/인원수)을 사용
  if(!tmpl || !Object.keys(tmpl).length) return {empty:true};
  const noDD=new Set(rosterRecords.filter(r=>r.noDD).map(r=>r.name));
  const count={}; names.forEach(n=>count[n]=0);   // 이번 달 총 배정 횟수
  const result={};

  // 자리 목록 + 각 자리의 요구 자격
  const tasks=[];
  for(let day=1; day<=daysInMonth(); day++){
    (tmpl[day]||[]).forEach((s,si)=>{
      const capKey=massCapKey(s,day);
      ['대','소'].forEach(role=>{
        const n=(s[role]||[]).length;
        for(let i=0;i<n;i++){
          const isDD = isSunday(day) && role==='대';   // 일요일 대 = 대대(최고 레벨)
          // 자격 제한이 있는 자리를 먼저 채움(후보가 적어 제약이 강함), 그다음 대대, 그다음 일반
          const priority = capKey ? 0 : (isDD?1:2);
          tasks.push({day,si,role,i,isDD,capKey,priority});
        }
      });
    });
  }
  tasks.sort((a,b)=>a.priority-b.priority);

  const dayUsed={};
  const getDayUsed=d=>{ if(!dayUsed[d]) dayUsed[d]=new Set(); return dayUsed[d]; };

  for(const t of tasks){
    if(!result[t.day]) result[t.day]=(tmpl[t.day]||[]).map(s=>({t:s.t,c:s.c||'',label:s.label||'',대:[...(s.대||[]).map(()=>'') ],소:[...(s.소||[]).map(()=>'') ]}));
    const used=getDayUsed(t.day);
    // 후보: 자격 OK + 대대 자격 + 그날 미사용
    const eligible=n=> canServe(n,t.capKey) && (!t.isDD || !noDD.has(n));
    let cand=names.filter(n=>!used.has(n) && eligible(n));
    if(!cand.length) cand=names.filter(eligible);     // 그날 중복 허용 fallback
    if(!cand.length) cand=names.filter(n=>!used.has(n)); // 자격 무시 fallback
    if(!cand.length) cand=[...names];
    const min=Math.min(...cand.map(n=>count[n]));
    const pool=shuffle(cand.filter(n=>count[n]===min));
    const chosen=pool[0];
    result[t.day][t.si][t.role][t.i]=chosen;
    count[chosen]++; used.add(chosen);
  }
  return {result,count};
}

function openAuto(){
  mTitle.textContent='한 달 자동배정';
  if(!assign || !Object.keys(assign).length){
    mBody.innerHTML=`<div style="font-size:13px; color:var(--muted); margin-bottom:12px;">
      ${curY}년 ${curM}월은 아직 미사 틀이 없습니다. 먼저 <b>새 달 만들기</b>로 이 달을 생성하세요.</div>
      <div class="right"><button class="btn" onclick="closeM()">닫기</button></div>`;
    openM(); return;
  }
  mBody.innerHTML=`
    <div style="font-size:13px; color:var(--muted); margin-bottom:12px;">
      ${curY}년 ${curM}월 전체를 규칙에 맞춰 자동으로 새로 배정합니다.<br>
      · 미사 시간·요일·인원수 틀은 그대로 두고 사람만 채웁니다.<br>
      · 일요일 '대' 자리(대대)에는 <b>대대 제외</b> 학생을 넣지 않습니다.<br>
      · 명단의 자격(새벽·성시간·신심 등)과 <b>배정 제외</b>를 지킵니다.<br>
      · 모두 비슷한 횟수가 되도록 균등 + 무작위로 섞습니다.
    </div>
    <div style="font-size:12px; color:var(--warn); background:var(--warn-bg); padding:9px; border-radius:8px; margin-bottom:12px;">
      ⚠️ 실행하면 <b>${curY}년 ${curM}월 배정이 모두 새 배정으로 바뀝니다.</b> 먼저 미리보기로 확인하세요.
    </div>
    <div class="right">
      <button class="btn" onclick="closeM()">취소</button>
      <button class="btn primary" id="genBtn">미리보기 생성</button>
    </div>
    <div id="autoPrev"></div>`;
  openM();
  document.getElementById('genBtn').onclick=showAutoPreview;
}

let lastAuto=null;
function showAutoPreview(){
  const out=buildAutoAssign();
  if(!out){ alert('명단이 부족합니다.'); return; }
  if(out.empty){ alert('이 달의 미사 틀이 없습니다. 먼저 새 달 만들기를 하세요.'); return; }
  lastAuto=out.result;
  // 횟수 요약
  const entries=Object.entries(out.count).sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0],'ko'));
  const maxC=Math.max(...entries.map(e=>e[1])), minC=Math.min(...entries.map(e=>e[1]));
  const rows=entries.map(([n,c])=>`<span style="display:inline-block; background:#f0efe9; border-radius:6px; padding:2px 7px; margin:2px; font-size:12px;">${n} <b>${c}</b></span>`).join('');
  const prev=document.getElementById('autoPrev');
  prev.innerHTML=`
    <div style="border-top:1px solid var(--line); margin-top:14px; padding-top:12px;">
      <div style="font-size:13px; margin-bottom:6px;">배정 횟수 (최소 ${minC} ~ 최대 ${maxC}회)</div>
      <div style="max-height:150px; overflow:auto; margin-bottom:12px;">${rows}</div>
      <div class="right">
        <button class="btn" onclick="showAutoPreview()">다시 섞기</button>
        <input id="autoAdmin" placeholder="처리 임원 이름" style="width:auto; margin:0 6px 0 0;">
        <button class="btn primary" id="applyAuto">이 배정으로 확정</button>
      </div>
    </div>`;
  document.getElementById('applyAuto').onclick=()=>{
    const an=val('autoAdmin')||'임원';
    assign=lastAuto; saveAssign();
    adminLog(`[자동배정] ${an} · ${curY}년 ${curM}월 전체 자동 재배정 (균등 ${minC}~${maxC}회)`);
    closeM();
    toast('자동배정을 적용했습니다.');
  };
}

/* ---------- 간단 토스트 ---------- */
function toast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#2c2c2a;color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;z-index:99;max-width:90%;text-align:center;';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2600);
}

function renderAll(){ renderBoard(); renderReqs(); renderLogs(); renderAdminLogs(); }

/* ---------- 월 선택 / 전환 UI ---------- */
function updateTitle(){
  document.getElementById('title').innerHTML=`${curY}년 ${curM}월 복사 배정표 <span id="lastMod" class="lastmod"></span>`;
  renderLastMod();
  const sel=document.getElementById('monthSel');
  if(sel) sel.value=monthKey(curY,curM);
}
function renderLastMod(){
  const el=document.getElementById('lastMod'); if(!el) return;
  const t = (assign && assign.__updated) ? assign.__updated : null;
  el.textContent = t ? `· 최종 변경 ${t}` : '';
}
function monthExists(y,m){ return online ? !!monthsIndex[monthKey(y,m)] : !!demoMonths[monthKey(y,m)]; }
function updateMonthState(){
  const el=document.getElementById('monthState');
  if(!el) return;
  if(!Object.keys(assign||{}).length){ el.textContent='— 아직 배정 없음 (관리자: 새 달 만들기)'; el.style.color='var(--warn)'; }
  else { el.textContent=''; }
}
function buildMonthSelect(){
  const sel=document.getElementById('monthSel');
  if(!sel) return;
  // 존재하는 월 + 현재월 + 앞으로 3개월을 후보로
  const keys=new Set(Object.keys(online?monthsIndex:demoMonths));
  keys.add(monthKey(curY,curM));
  // 정렬
  const arr=[...keys].sort();
  sel.innerHTML=arr.map(k=>{
    const [y,m]=k.split('-').map(Number);
    const has = online?monthsIndex[k]:demoMonths[k];
    return `<option value="${k}">${y}년 ${m}월${has?'':' (빈 달)'}</option>`;
  }).join('');
  sel.value=monthKey(curY,curM);
}
function goMonth(y,m){
  // 음수/13월 보정
  while(m<1){m+=12;y--;} while(m>12){m-=12;y++;}
  loadMonth(y,m);
  buildMonthSelect();
}

/* 새 달 만들기: 요일 기준 틀 생성 */
function newMonth(){
  // 기본 제안: 현재 보는 달의 다음 달
  let ty=curY, tm=curM+1; if(tm>12){tm=1;ty++;}
  mTitle.textContent='새 달 만들기';
  // 연/월 선택지: 현재월 ~ +5개월
  let opts='';
  for(let i=0;i<6;i++){ let yy=curY, mm=curM+i; while(mm>12){mm-=12;yy++;}
    const has=monthExists(yy,mm);
    opts+=`<option value="${yy}-${mm}" ${(yy===ty&&mm===tm)?'selected':''}>${yy}년 ${mm}월${has?' (이미 있음)':''}</option>`;
  }
  mBody.innerHTML=`
    <div style="font-size:13px; color:var(--muted); margin-bottom:12px;">
      요일 기준으로 미사 틀을 자동 생성합니다.<br>
      · 월 6:30 / 화·목 19:30 (대1·소1)<br>
      · 토 17:00 (대2·소2), 첫째 주 토 10:00 성모신심 추가<br>
      · 일 9:00·17:00 (대2·소2)<br>
      성시간·찬미미사·방학 미사 등 특별 미사는 생성 후 직접 조정하세요.
    </div>
    <label>만들 달</label>
    <select id="nmSel">${opts}</select>
    <div id="nmWarn"></div>
    <div class="right">
      <button class="btn" onclick="closeM()">취소</button>
      <button class="btn primary" id="nmGo">이 달 틀 만들기</button>
    </div>`;
  openM();
  const sel=document.getElementById('nmSel');
  const warn=document.getElementById('nmWarn');
  function chk(){ const [y,m]=sel.value.split('-').map(Number);
    warn.innerHTML = monthExists(y,m)
      ? `<div style="font-size:12px; color:var(--warn); background:var(--warn-bg); padding:8px; border-radius:8px; margin-bottom:12px;">이미 있는 달입니다. 다시 만들면 <b>기존 배정이 빈 틀로 초기화</b>됩니다.</div>` : '';
  }
  sel.onchange=chk; chk();
  document.getElementById('nmGo').onclick=()=>{
    const [y,m]=sel.value.split('-').map(Number);
    if(monthExists(y,m) && !confirm(`${y}년 ${m}월은 이미 있습니다. 빈 틀로 초기화할까요?`)) return;
    const tmpl=buildMonthTemplate(y,m);
    if(online){ db.ref('months/'+monthKey(y,m)+'/assign').set(tmpl); }
    else { demoMonths[monthKey(y,m)]={assign:tmpl,requests:{},logs:{}}; }
    closeM();
    goMonth(y,m);
    toast(`${y}년 ${m}월 틀을 만들었습니다. 이제 자동배정을 하세요.`);
  };
}

document.getElementById('prevM').onclick=()=>goMonth(curY,curM-1);
document.getElementById('nextM').onclick=()=>goMonth(curY,curM+1);
document.getElementById('monthSel').onchange=function(){ const [y,m]=this.value.split('-').map(Number); goMonth(y,m); };
document.getElementById('newMonthBtn').onclick=newMonth;

initFirebase();
updateTitle();
renderAll();
</script>
