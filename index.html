function cssId(name){ return name.replace(/[^a-zA-Z0-9가-힣]/g,'_'); }
window.toggleExclude=function(name,on){
  if(on) autoDraft.exclude.add(name); else autoDraft.exclude.delete(name);
  const el=document.getElementById('tgt_'+cssId(name)); if(el) el.textContent = on?0:(autoDraft.targets[name]||0);
  recalcSum();
};
window.bumpTarget=function(name,delta,minV){
  if(autoDraft.exclude.has(name)) return;
  let v=(autoDraft.targets[name]||0)+delta;
  if(v<minV)v=minV; if(v<0)v=0; if(v>31)v=31;
  autoDraft.targets[name]=v;
  const el=document.getElementById('tgt_'+cssId(name)); if(el) el.textContent=v;
  recalcSum();
};
let _autoTotalSlots = 0;  // 자동배정 미리보기의 총 자리수(방학 포함)
function recalcSum(){
  let s=0; state.roster.forEach(p=>{ if(!autoDraft.exclude.has(p.name)) s+=(autoDraft.targets[p.name]||0); });
  const el=$('#ao_sum'); if(el) el.textContent=s;
  // 자리수 대비 목표 합계 비교 → 부족하면 빨간색 경고
  const line=document.getElementById('ao_sumline');
  const lackEl=document.getElementById('ao_lack');
  if(line){
    const lack=_autoTotalSlots - s;
    if(s < _autoTotalSlots){ line.style.color='var(--danger)'; line.style.fontWeight='700'; }
    else { line.style.color='var(--sub)'; line.style.fontWeight='400'; }
    if(lackEl){
      lackEl.textContent = lack>0 ? ` · ⚠ 목표가 ${lack}개 부족 → 빈자리 발생`
                          : (lack<0 ? ` · 목표가 ${-lack}개 많음` : ' · 자리수와 일치');
    }
  }
}

/* ===== 배정 현황 이미지/PDF 저장 ===== */
// 현재 보고 있는 월의 배정 현황(제목 + 달력/목록)을 캡처할 임시 컨테이너를 만든다.
async function captureSchedule(){
  const [y,m]=state.ym.split('-').map(Number);
  const mo=getMonth();
  // 현재 어떤 모드를 보고 있든 항상 '달력' 형태로 저장한다.
  // calView를 달력으로 강제 렌더한 뒤 그 결과를 복제해 캡처(원래 화면 모드는 건드리지 않음).
  renderCal(y,m,mo);
  const view = document.getElementById('calView');
  // 캡처용 래퍼: 흰 배경 + 제목 + 달력 복제
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-99999px;top:0;background:#fff;padding:20px;width:'+Math.max(view.scrollWidth,720)+'px';
  const title=document.createElement('div');
  title.style.cssText='font-size:22px;font-weight:800;margin-bottom:14px;color:#1a1a1a';
  title.textContent=`${y}년 ${m}월 복사 배정표`;
  wrap.appendChild(title);
  const clone=view.cloneNode(true);
  clone.style.display='block';
  // 가로 스크롤 영역을 펼쳐서 전체가 한 화면에 보이도록
  clone.querySelectorAll('.calscroll').forEach(el=>{el.style.overflow='visible';});
  clone.querySelectorAll('.calinner').forEach(el=>{el.style.minWidth='auto';});
  // 편집용 버튼류는 캡처에서 제거
  clone.querySelectorAll('.addmass,.addrow,.delrow,button').forEach(el=>el.remove());
  // 오늘 날짜 강조(파란 테두리)는 저장 이미지에서 제거
  clone.querySelectorAll('.today').forEach(el=>el.classList.remove('today'));
  wrap.appendChild(clone);
  document.body.appendChild(wrap);
  try{
    const canvas=await html2canvas(wrap,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    return canvas;
  } finally {
    document.body.removeChild(wrap);
    // 화면을 원래 모드로 복구(목록을 보고 있었다면 다시 목록으로)
    renderSchedule();
  }
}
function scheduleFileName(ext){
  const [y,m]=state.ym.split('-').map(Number);
  return `복사배정표_${y}년${m}월.${ext}`;
}
$('#imgBtn').onclick=async ()=>{
  if(typeof html2canvas==='undefined'){toast('이미지 라이브러리를 불러오지 못했습니다');return;}
  toast('이미지를 만드는 중…');
  try{
    const canvas=await captureSchedule();
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download=scheduleFileName('png');
    a.click();
    toast('이미지를 저장했습니다');
  }catch(e){ console.warn(e); toast('이미지 저장에 실패했습니다'); }
};
$('#pdfBtn').onclick=async ()=>{
  if(typeof html2canvas==='undefined' || !window.jspdf){
    // 라이브러리 로드 실패 시: 브라우저 인쇄 대화상자로 폴백(여기서 'PDF로 저장' 선택 가능)
    toast('인쇄 화면에서 «PDF로 저장»을 선택하세요');
    const wasMode=state.mode; state.mode='cal'; renderSchedule();
    setTimeout(()=>{ window.print(); state.mode=wasMode; renderSchedule(); }, 250);
    return;
  }
  toast('PDF를 만드는 중…');
  try{
    const canvas=await captureSchedule();
    const img=canvas.toDataURL('image/png');
    const { jsPDF }=window.jspdf;
    // 캡처 비율에 맞춰 세로/가로 자동 선택
    const portrait = canvas.height>=canvas.width;
    const pdf=new jsPDF({orientation:portrait?'p':'l', unit:'mm', format:'a4'});
    const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
    const margin=10;
    const maxW=pw-margin*2, maxH=ph-margin*2;
    let w=maxW, h=w*canvas.height/canvas.width;
    if(h>maxH){ h=maxH; w=h*canvas.width/canvas.height; }
    const x=(pw-w)/2, yPos=margin;
    pdf.addImage(img,'PNG',x,yPos,w,h);
    pdf.save(scheduleFileName('pdf'));
    toast('PDF를 저장했습니다');
  }catch(e){ console.warn(e); toast('PDF 저장에 실패했습니다'); }
};

/* ===== 배정표 엑셀 다운로드 (화면 달력처럼 7열 달력 모양) ===== */
$('#xlsBtn').onclick=()=>{
  if(typeof XLSX==='undefined'){toast('엑셀 라이브러리를 불러오지 못했습니다');return;}
  const [y,m]=state.ym.split('-').map(Number);
  const mo=getMonth();
  const first=new Date(y,m-1,1).getDay();
  const last=new Date(y,m,0).getDate();
  // 한 미사를 셀 텍스트로: "시간 제목\n대 이름들\n소 이름들"
  const massText=(ms)=>{
    const lines=[];
    const head = (isSpecialMass(ms.title)? ms.title+' ' : '') + (ms.time||'') + ' ('+(COLOR_NAME[ms.color]?COLOR_NAME[ms.color].lbl:'')+')';
    lines.push(head.trim());
    const big=(ms.big||[]).filter(Boolean);
    const small=(ms.small||[]).filter(Boolean);
    if(big.length) lines.push('대 '+big.join(' '));
    if(small.length) lines.push('소 '+small.join(' '));
    return lines.join('\n');
  };
  // 한 날짜 칸: 날짜 + 미사들
  const dayText=(d)=>{
    const day=mo.assign[d];
    let s=String(d);
    if(day && day.masses && day.masses.length){
      s += '\n' + day.masses.map(massText).join('\n\n');
    }
    return s;
  };
  const rows=[];
  rows.push([`${y}년 ${m}월 복사 배정표`]);   // 제목
  rows.push(WD.slice());                       // 요일 헤더 일~토
  // 주 단위로 7칸씩
  let cells=[];
  for(let i=0;i<first;i++) cells.push('');     // 1일 앞 빈칸
  for(let d=1;d<=last;d++){
    cells.push(dayText(d));
    if(cells.length===7){ rows.push(cells); cells=[]; }
  }
  if(cells.length){ while(cells.length<7) cells.push(''); rows.push(cells); }

  const ws=XLSX.utils.aoa_to_sheet(rows);
  // 열 너비
  ws['!cols']=Array.from({length:7},()=>({wch:18}));
  // 제목 행 7칸 병합
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:6}}];
  // 모든 셀 줄바꿈 + 상단 정렬
  const range=XLSX.utils.decode_range(ws['!ref']);
  for(let R=range.s.r;R<=range.e.r;R++){
    for(let C=range.s.c;C<=range.e.c;C++){
      const addr=XLSX.utils.encode_cell({r:R,c:C});
      if(!ws[addr]) continue;
      ws[addr].s={ alignment:{ wrapText:true, vertical:'top', horizontal: R<2?'center':'left' } };
    }
  }
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,`${m}월`);
  XLSX.writeFile(wb,`복사배정표_${y}년${m}월.xlsx`);
  toast('엑셀을 저장했습니다');
};

/* 일반 사용자는 공개(배포)된 달만 볼 수 있으므로, 현재 달이 미공개면 가장 최근 공개 달로 이동 */
function ensureViewableMonth(){
  if(state.isAdmin) return;                 // 관리자는 제한 없음
  if(isPublished(state.ym)) return;         // 이미 공개된 달이면 그대로
  const latest=latestPublishedYm();
  if(latest) state.ym=latest;               // 최신 공개 달로
  // 공개된 달이 하나도 없으면 그대로 두되, 화면은 '배포 전' 상태로 표시됨
}
initFirebase();
ensureViewableMonth();
render();
updateLastMod();
