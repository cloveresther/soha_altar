
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>복사단 배정 관리</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f4f5f7; --card:#fff; --line:#e3e6ea; --ink:#1f2733; --sub:#6b7682;
  --brand:#4f6df5; --brand-d:#3b56d4; --soft:#eef1fe;
  --hong:#d23b3b; --nok:#2e9e5b; --baek:#c9a227; --bo:#7b51c4;
  --changed:#9c1f2e; --ok:#2e9e5b; --warn:#e08a1e; --danger:#d23b3b;
  --radius:14px; --shadow:0 1px 3px rgba(20,30,50,.08),0 4px 16px rgba(20,30,50,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:15px}
a{color:var(--brand)}
.wrap{max-width:1100px;margin:0 auto;padding:0 14px 90px}

/* Header */
header{position:sticky;top:0;z-index:30;background:rgba(244,245,247,.92);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.hdr{max-width:1100px;margin:0 auto;padding:10px 14px;display:flex;align-items:center;gap:10px}
.logo{font-weight:800;font-size:17px;letter-spacing:-.3px;display:flex;align-items:center;gap:7px}
.logo .dot{width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,var(--brand),#7c4dff);
  display:grid;place-items:center;color:#fff;font-size:13px}
.hdr .sp{flex:1}
.pill{font-size:12px;padding:5px 11px;border-radius:999px;background:var(--card);
  border:1px solid var(--line);color:var(--sub);font-weight:600}
.pill.on{background:var(--soft);color:var(--brand-d);border-color:#cdd6ff}
.iconbtn{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;font-size:17px}

/* Month bar */
.monthbar{display:flex;align-items:center;gap:8px;margin:16px 0 6px}
.monthbar h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.5px}
.monthbar .nav{width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;font-size:16px;font-weight:700}
.updated{font-size:12px;color:var(--sub);margin:0 0 12px}

/* View toggle */
.seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
.seg button{padding:7px 15px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--sub)}
.seg button.on{background:var(--brand);color:#fff}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.toolbar .sp{flex:1}
.pubbanner{margin:0 0 12px;padding:9px 13px;border-radius:10px;font-size:12.5px;font-weight:700;
  background:#fff4e5;color:#9a5b00;border:1px solid #ffd9a0}
.laundrybar{margin:0 0 10px;display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none}
.laundrybar::-webkit-scrollbar{display:none}
.laundrybar .lbsp{flex:1;min-width:8px}
.laundrybtn{display:inline-flex;align-items:center;gap:3px;padding:3px 6px;border-radius:8px;white-space:nowrap;flex:0 0 auto;
  border:none;background:none;color:var(--sub);font-size:11.5px;font-weight:600;cursor:pointer;opacity:.75}
.laundrybtn:hover{opacity:1;text-decoration:underline}
.laundrybtn:active{transform:scale(.98)}
.lnav{display:flex;align-items:center;justify-content:center;gap:14px;margin:4px 0 14px;font-size:16px}
.lnav b{min-width:110px;text-align:center}
.lwhen{text-align:center;font-weight:800;color:#b4456b;background:#fff0f5;border:1px solid #ffd0df;
  border-radius:10px;padding:9px;margin-bottom:14px}
.lempty{text-align:center;color:var(--sub);padding:24px 8px}
.lblock{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.lblock.wash{background:#eef6ff;border-color:#cfe4fb}
.lblock.iron{background:#f3eeff;border-color:#ddd2f3}
.lbtitle{font-weight:800;font-size:13px;margin-bottom:8px;color:#444}
.lblock.wash .lbtitle{color:#1d5fa8}
.lblock.iron .lbtitle{color:#5b4a9e}
.lnames{display:flex;flex-wrap:wrap;gap:7px}
.lname{background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:13.5px;font-weight:600}
.ntlist{display:flex;flex-direction:column;gap:10px}
.ntitem{border:1px solid var(--line);border-radius:12px;padding:11px 13px;background:#fffdf7}
.ntmeta{font-size:11.5px;color:var(--sub);font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.ntdel{margin-left:auto;border:none;background:none;color:#c0392b;font-size:11.5px;font-weight:700;cursor:pointer;padding:0}
.nttext{font-size:14px;line-height:1.55;color:var(--ink);white-space:pre-wrap;word-break:break-word}
.pubbanner.ok{background:#e7f7ee;color:#1c7a44;border-color:#aee3c4}
.tbtn.published{background:#e7f7ee;color:#1c7a44;border-color:#aee3c4}
.tbtn{padding:8px 13px;border-radius:10px;background:var(--card);border:1px solid var(--line);
  font-size:13.5px;font-weight:600;color:var(--ink);display:inline-flex;align-items:center;gap:5px}
.tbtn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.tbtn.stat{background:#e7f6f4;color:#0f766e;border-color:#a9ddd5}
.tbtn.save{padding:8px 10px;font-size:12.5px;white-space:nowrap;gap:3px}
.tbtn:active{transform:scale(.97)}

/* Calendar */
.calscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
.calinner{min-width:100%}
.calhead{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.calhead div{text-align:center;font-size:12px;font-weight:700;color:var(--sub);padding:4px 0}
.calhead div:first-child{color:var(--hong)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cell{background:var(--card);border:1px solid var(--line);border-radius:11px;min-height:96px;
  padding:6px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
.cell.empty{background:transparent;border:none}
.cell .dnum{font-size:12.5px;font-weight:700;color:var(--sub)}
.cell.sun .dnum{color:var(--hong)}
.cell.today{border-color:var(--brand);box-shadow:0 0 0 2px var(--soft)}
.mass{border-radius:8px;padding:4px 6px;font-size:11px;background:#fafbfc;border:1px solid #eef0f3;line-height:1.3}
.mass .mt{display:flex;align-items:center;gap:4px;font-weight:700;font-size:11px;flex-wrap:wrap}
.mass .mttl{font-weight:800;color:var(--brand);font-size:10.5px;line-height:1.2;margin-bottom:1px;word-break:keep-all}
.maintbar{margin-top:28px;padding-top:14px;border-top:1px dashed #e3e7ec;text-align:center}
.maintlink{background:none;border:none;color:#b3bac3;font-size:11px;cursor:pointer;padding:4px 8px}
.maintlink:hover{color:var(--danger);text-decoration:underline}
.cdot{width:9px;height:9px;border-radius:3px;flex:none}
.clbl{flex:none;display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;
  border-radius:4px;font-size:10px;font-weight:800;line-height:1;color:#fff}
.cl-hong{background:var(--hong)}.cl-nok{background:var(--nok)}.cl-bo{background:var(--bo)}
.cl-baek{background:#fff;color:#555;border:1px solid #cfd6df}
.c-hong{background:var(--hong)}.c-nok{background:var(--nok)}.c-baek{background:var(--baek)}.c-bo{background:var(--bo)}
.mass .who{color:var(--sub);font-size:10.5px;margin-top:1px;word-break:keep-all}
.mass .who.grid{display:grid;grid-template-columns:1fr 1fr;gap:0 4px;column-gap:5px}
.mass .who.grid span{overflow:visible;text-overflow:clip;white-space:nowrap;color:var(--ink)}
.mass .who.grid span.empty{color:#c4cad2}
.mass .who.grid .rolep{display:inline-block;color:var(--sub);font-weight:700;margin-right:2px;font-size:9.5px}
.mass .who b{color:var(--ink);font-weight:600}
.mass .who .chg{color:var(--changed);font-weight:700}

/* List/card view */
.cards{display:flex;flex-direction:column;gap:10px}
.daycard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden}
.daycard .dh{padding:11px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;
  background:#fbfcfd}
.daycard .dh .dd{font-weight:800;font-size:15px}
.daycard .dh .dw{font-size:12.5px;color:var(--sub)}
.daycard .dh .dw.sun{color:var(--hong)}
.daycard .dh .lit{font-size:11.5px;color:var(--sub);margin-left:auto;text-align:right;max-width:48%;word-break:keep-all}
.massrow{padding:11px 14px;border-bottom:1px solid #f1f3f5;display:flex;flex-direction:column;gap:6px}
.massrow:last-child{border-bottom:none}
.massrow .top{display:flex;align-items:center;gap:8px}
.massrow .time{font-weight:800;font-size:14px;min-width:54px}
.massrow .ttl{font-size:13px;color:var(--sub);flex:1}
.roles{display:flex;flex-wrap:wrap;gap:6px}
.role{font-size:12px;background:#f4f6f8;border:1px solid #e8ebee;border-radius:8px;padding:3px 9px}
.role .lbl{color:var(--sub);font-weight:700;margin-right:4px}
.role .nm{font-weight:600}
.role .nm.chg{color:var(--changed)}
.role.empty{border-style:dashed;color:var(--sub)}
.editbtn{font-size:11px;color:var(--brand);font-weight:700;padding:2px 8px;border:1px solid #cdd6ff;
  border-radius:7px;background:var(--soft)}
.addmass{margin-top:4px;width:100%;font-size:11px;font-weight:700;color:var(--brand);
  border:1px dashed #c3ccef;border-radius:8px;background:#f7f9ff;padding:5px 0}
.addmass:active{transform:scale(.97)}
.addmass.list{font-size:13px;padding:9px 0}
.massrow.addrow{border-bottom:none;padding-top:8px;padding-bottom:12px}
.autoopts{display:flex;align-items:center;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.optchk{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.optchk input{width:auto}
.optgap{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.optgap select{padding:5px 8px;border:1px solid var(--line);border-radius:8px}
.ttable{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:12px}
.trow{display:flex;align-items:center;padding:7px 10px;border-bottom:1px solid #f1f3f5;font-size:13.5px;gap:6px}
.trow:last-child{border-bottom:none}
.trow.th{background:#fbfcfd;font-weight:700;color:var(--sub);font-size:12px}
.trow.exrow{opacity:.45}
.trow .tn{flex:1;font-weight:600;display:flex;align-items:center;gap:5px}
.trow .tn .dd{font-size:9.5px;font-style:normal;background:#fbeaea;color:#b32a2a;border-radius:5px;padding:0 5px;font-weight:700}
.trow .tg{width:38px;color:var(--sub);font-size:12px}
.trow .tx{width:34px;text-align:center}
.trow .tx input{width:auto}
.trow .tc{display:flex;align-items:center;gap:8px;width:96px;justify-content:flex-end}
.trow .tc b{min-width:18px;text-align:center;font-size:14px}
.trow .tc2{width:50px;text-align:right;font-weight:700;color:var(--brand-d)}
.trow .stp{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:#f7f9ff;
  font-size:15px;font-weight:700;color:var(--brand);display:grid;place-items:center}
.trow .stp:active{transform:scale(.9)}

/* FAB & request */
.reqbtn{font-size:12px;color:var(--brand-d);font-weight:700;align-self:flex-start;
  padding:4px 10px;border:1px solid #cdd6ff;border-radius:8px;background:var(--soft)}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(255,255,255,.94);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;
  padding:6px 4px env(safe-area-inset-bottom)}
.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;
  font-size:10.5px;font-weight:600;color:var(--sub)}
.bnav button .ic{font-size:19px}
.bnav button.on{color:var(--brand)}
.bnav .admin-only{display:none}
body.admin .bnav .admin-only{display:flex}

/* Modal / sheet */
.scrim{position:fixed;inset:0;background:rgba(15,20,35,.45);z-index:50;display:none;align-items:flex-end;justify-content:center}
.scrim.show{display:flex}
@media(min-width:640px){.scrim{align-items:center}}
.sheet{background:var(--card);width:100%;max-width:560px;border-radius:20px 20px 0 0;
  max-height:88vh;overflow:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
@media(min-width:640px){.sheet{border-radius:18px;max-height:86vh}}
.sheet .sh{position:sticky;top:0;background:var(--card);padding:16px 18px 12px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;z-index:2}
.sheet .sh h3{margin:0;font-size:17px;font-weight:800}
.sheet .sh .x{margin-left:auto;width:32px;height:32px;border-radius:9px;background:#f1f3f5;display:grid;place-items:center;font-size:16px}
.sbody{padding:16px 18px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fcfcfd}
.field textarea{resize:vertical;font-family:inherit;font-size:14px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);background:#fff}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btnfull{width:100%;padding:13px;border-radius:12px;background:var(--brand);color:#fff;font-weight:700;font-size:15px;margin-top:6px}
.btnfull.ghost{background:#f1f3f5;color:var(--ink)}
.btnfull.danger{background:var(--danger)}
.btnfull:active{transform:scale(.99)}
.help{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.5}

/* admin slot editor */
.slotedit{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.slotedit .lbl{font-size:11px;font-weight:700;color:var(--sub);min-width:38px}
.slotedit select{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:9px}
.slotedit .del{width:32px;height:32px;border-radius:8px;background:#fbeaea;color:var(--danger);display:grid;place-items:center}

/* req list */
.reqitem{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.reqitem .rt{font-weight:700;font-size:13.5px;margin-bottom:3px}
.reqitem .rs{font-size:12px;color:var(--sub);margin-bottom:8px}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700}
.badge.wait{background:#fff4e2;color:#b9731a}
.badge.ok{background:#e6f6ec;color:#1f7a45}
.badge.no{background:#fbeaea;color:#b32a2a}
.reqactions{display:flex;gap:7px;margin-top:8px}
.reqactions button{flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:700;border:1px solid var(--line)}
.reqactions .approve{background:var(--ok);color:#fff;border-color:var(--ok)}
.reqactions .reject{background:#fff;color:var(--danger);border-color:#f2c4c4}
.reqactions .cancel{background:#f1f3f5;color:var(--ink)}

.empty-state{text-align:center;color:var(--sub);padding:40px 20px;font-size:14px}
.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px}
.rrow{cursor:pointer}
.rrow:active{background:var(--soft)}
.delrow{width:28px;height:28px;border-radius:7px;background:#fbeaea;color:var(--danger);font-size:13px;border:none}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin-bottom:6px}
.qchk{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:4px 0}
.qchk input{width:auto}
.tallybar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.tallybar .tnav{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);font-size:16px;font-weight:700}
.tallybar b{font-size:16px}
.tallybar .thint{font-size:11.5px;color:var(--sub);margin-left:auto}
.tallywrap{overflow:auto;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
.tallytbl{border-collapse:collapse;width:100%;font-size:12px;min-width:640px}
.tallytbl th,.tallytbl td{border:1px solid #eef0f3;padding:4px 5px;text-align:center;vertical-align:top}
.tallytbl th{background:#fbfcfd;color:var(--sub);font-weight:700;width:40px}
.tallytbl .kindcol{position:sticky;left:0;background:#fbfcfd;font-weight:700;color:var(--ink);min-width:62px;z-index:1}
.tcell{cursor:pointer;min-width:46px;height:34px}
.tcell:active{background:var(--soft)}
.tname{display:inline-block;font-size:11px;font-weight:600;border-radius:5px;padding:1px 5px;margin:1px;white-space:nowrap}
.tname.auto{background:var(--soft);color:var(--brand-d)}
.tname.man{background:#f1f3f5;color:var(--ink)}
.tempty{color:#c4cad2;font-size:14px;font-weight:700}
.tlegend{display:flex;gap:10px;align-items:center;font-size:11.5px;color:var(--sub);margin-bottom:4px}
.tcurlist{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;min-height:24px}
.tcurlist .tname{font-size:13px;padding:5px 9px;display:inline-flex;align-items:center;gap:6px}
.tlock{font-style:normal;font-size:9.5px;opacity:.6}
.trm{border:none;background:rgba(0,0,0,.08);border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;color:#555}
.tpick{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.tpk{font-size:13px;font-weight:600;padding:7px 11px;border-radius:9px;border:1px solid var(--line);background:#fff;display:inline-flex;align-items:center;gap:5px}
.tpk.q{border-color:#cdd6ff;background:#f7f9ff}
.tpk i{font-style:normal;font-size:10px;color:#fff;background:#aab2bd;border-radius:5px;padding:1px 5px}
.tpk.q i{background:var(--brand)}
.limtbl{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:12px}
.limrow{display:grid;grid-template-columns:1fr 1.3fr 1.3fr;align-items:center;padding:7px 12px;border-bottom:1px solid #f1f3f5}
.limrow:last-child{border-bottom:none}
.limrow.limhd{background:#fbfcfd;font-weight:700;color:var(--sub);font-size:12.5px}
.limrow .lg{font-weight:700}
.limrow .lc{display:flex;align-items:center;justify-content:center;gap:10px}
.limrow .lc b{min-width:20px;text-align:center;font-size:15px}
.ctabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.ctab{font-size:13px;font-weight:600;padding:7px 13px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--sub)}
.ctab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.counttbl td,.counttbl th{min-width:30px}
.counttbl .kindcol{min-width:78px;text-align:left}
.counttbl .kindcol .cg{font-style:normal;font-size:9.5px;color:#fff;background:#aab2bd;border-radius:5px;padding:1px 5px;margin-left:5px}
.counttbl td.z{color:#d3d8de}
.counttbl .sumcol{font-weight:800;color:var(--brand-d);background:#f7f9ff;position:sticky;right:0}
.counttbl th.sumcol{background:#eef1fe}
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dchip{display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 0;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:14px;font-weight:700}
.dchip i{font-style:normal;font-size:9.5px;color:var(--sub);font-weight:600}
.dchip.cur{background:var(--soft);border-color:var(--brand);color:var(--brand)}
.dchip:active{transform:scale(.94)}
.vactbl{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:8px}
.vacschool{border-bottom:1px solid #eef0f3;padding:4px 0}
.vacschool:last-child{border-bottom:none}

(function migrateVacation(){
  const v=state.vacation; if(!v||!v.schools) return;
  let changed=false;
  for(const s in v.schools){
    const sc=v.schools[s];
    if(sc && ('start' in sc || 'end' in sc) && !sc.summer && !sc.winter){
      v.schools[s]={summer:{start:sc.start||'',end:sc.end||''}, winter:{start:'',end:''}};
      changed=true;
    } else {
      sc.summer=sc.summer||{start:'',end:''};
      sc.winter=sc.winter||{start:'',end:''};
    }
  }

function isLowerPriorityGrade(kind, grade){
  if(!kind) return false;
  const pri=massPriority()[kind]||[];
  return pri.length>0 && !pri.includes(grade);
}
/* 미사 제목 → 정기미사 종류 키(학년 설정용). 없으면 null */
function routineKindOf(title){
  const t=title||'';
  if(t.includes('새벽')) return 'dawn';
  if(t.includes('전야')) return 'vigil';     // '주일'보다 먼저 검사(전야에 '주일' 포함됨)
  if(t.includes('주일')) return 'sunday';
  if(t.includes('평일')) return 'weekday';
  return null;
}
/* 특정 날짜(yy,mm,dd)에 방학 중인지: 어느 학교든 여름·겨울 기간이면 true. 학교별 집합 반환 */
function inRangeMD(md, start, end){
  if(!start||!end) return false;
  if(start<=end) return md>=start && md<=end;       // 같은 해 안(여름)
  return md>=start || md<=end;                       // 해를 넘김(겨울: 12월~2월)
}
function vacationSchoolsOn(yy,mm,dd){
  const cfg=vacationCfg(); const md=String(mm).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
  // 관리자 스위치가 꺼져 있으면 방학 배정을 전혀 반영하지 않음
  if(cfg.enabled===false) return new Set();
  // 관리자가 '반영 기간'을 직접 정했다면, 그 기간 밖의 날짜는 방학 배정 제외
  if(cfg.applyStart && cfg.applyEnd && !inRangeMD(md, cfg.applyStart, cfg.applyEnd)) return new Set();
  const set=new Set();
  for(const sch in (cfg.schools||{})){
    const v=cfg.schools[sch]; if(!v)continue;
    const sm=v.summer||{}, wi=v.winter||{};
    if(inRangeMD(md, sm.start, sm.end) || inRangeMD(md, wi.start, wi.end)) set.add(sch);
  }
  return set;
}

  const cfg=vacationCfg();
  const schools=vacationSchoolsOn(yy,mm,dd);
  if(!schools.size) return [];
  const grades=new Set(cfg.grades||[]);
  return state.roster.filter(p=>!p.excluded && schools.has(p.school) && grades.has(p.grade));
}

function nthWeekdayOfMonth(yy,mm,d){
  // 그 달에서 d일이 같은 요일 중 몇 번째인지(1~) 반환
  return Math.floor((d-1)/7)+1;
}
/* 정기 미사(새벽·평일·주일·주일전야)는 제목을 달력에 숨기고, 그 외(성시간·성모신심·찬미·관리자 지정)만 표시 */
const ROUTINE_TITLES=['새벽미사','평일미사','주일미사','주일 전야미사','방학미사'];
function isSpecialMass(title){ return !!title && !ROUTINE_TITLES.includes(title); }
function genMonth(yy,mm){
  const days={};
  const last=new Date(yy,mm,0).getDate();
  let firstSatSeen=false;
  for(let d=1; d<=last; d++){
    const date=new Date(yy,mm-1,d);
    const w=date.getDay(); // 0 Sun..6 Sat
    const nth=nthWeekdayOfMonth(yy,mm,d); // 이 날이 그 요일의 몇째 주인지
    const masses=[];
    const lit=litColor(date);
    const mk=(time,title,color,big,small)=>({id:uid(),time,title,color,
        big:Array(big).fill(''),small:Array(small).fill('')});
    if(w===1) masses.push(mk('06:30','새벽미사',lit.color,1,1));         // Mon dawn
    if(w===2) masses.push(mk('19:30','평일미사',lit.color,1,1));         // Tue evening
    if(w===4){ // Thursday: 첫째주=성시간, 넷째주=찬미미사, 그 외=평일
      if(nth===1) masses.push(mk('19:30','성시간',lit.color,1,1));
      else if(nth===4) masses.push(mk('19:30','찬미미사',lit.color,1,1));
      else masses.push(mk('19:30','평일미사',lit.color,1,1));
    }
    if(w===6){ // Saturday
      if(nth===1){ masses.push(mk('10:00','성모신심',lit.color,1,1)); firstSatSeen=true; } // 첫째주 토
      masses.push(mk('17:00','주일 전야미사',sundayColorFor(date),2,2)); // vigil -> Sunday color
    }
    if(w===0){ // Sunday
      masses.push(mk('09:00','주일미사',lit.color,2,2));
      masses.push(mk('17:00','주일미사',lit.color,2,2));
    }
    // 방학 기간 수·금 10:00 미사: 그 날 방학 대상자가 있으면 생성
    if(w===3 || w===5){
      const elig=vacationEligibleOn(yy,mm,d);
      if(elig.length){
        const cfg=vacationCfg();
        masses.push(mk(cfg.time||'10:00','방학미사',lit.color,1,1));
      }
    }
    if(masses.length) days[d]={masses,lit:lit};
  }
  return {assign:days, updated:Date.now(), requests:[], logs:[], adminlogs:[], published:false};
}
function getMonth(){
  if(!state.months[state.ym]){
    const [y,m]=state.ym.split('-').map(Number);
    state.months[state.ym]=genMonth(y,m);
    save();
  }
  return state.months[state.ym];
}
/* ===== 배정표 배포(공개) 상태 ===== */
/* 각 달 mo.published===true 면 일반 사용자에게 공개. 관리자는 항상 모두 볼 수 있음.
   ※ 기존 데이터 호환: published 플래그가 아예 없던(undefined) 달은 '이미 공개'로 간주(과거 운영 상태 유지).
      명시적으로 false인 달만 미공개. */
function isPublished(ymKey){
  const mo=state.months[ymKey];
  if(!mo) return false;
  // 일반 사용자에게는 2026년 1~5월을 공개하지 않음(데이터 정리 전이므로 6월부터 오픈).
  // 관리자는 이 함수와 무관하게 모든 달을 볼 수 있음.
  if(ymKey>='2026-01' && ymKey<='2026-05') return false;
  return mo.published!==false;   // undefined(레거시)→공개, true→공개, false→미공개
}
/* 공개된 달 'YYYY-MM' 목록(정렬) */
function publishedYms(){
  return Object.keys(state.months).filter(k=>isPublished(k)).sort();
}
/* 일반 사용자에게 보여줄 기본(가장 최근 공개) 달. 없으면 null */

/* ====================== AUTO-ASSIGN ====================== */
function gradeRank(g){const o=['초4','초5','초6','중1','중2','중3','고1','고2','고3'];return o.indexOf(g);}
function inRange(g,lo,hi){const r=gradeRank(g);return r>=gradeRank(lo)&&r<=gradeRank(hi);}
/* 미사 종류 판별 — 특별미사(자격 상위)와 일반미사(학년 규칙) 구분 */
function specialCap(title){
  // 자격(q 키)을 요구하는 특별미사. 매칭되면 그 자격만으로 판정(학년·간격 무관)
  if(title.includes('성시간')) return 'seongsigan';
  if(title.includes('신심'))   return 'sinsim';     // 성모신심
  if(title.includes('찬미')||title.includes('찬양')) return 'chanyang';
  if(title.includes('어린이')) return 'children';
  return null;
}
/* 누적표에서 다룰 특별미사 종류 */
const SPECIAL_KINDS=[
  {key:'seongsigan', label:'성시간',   match:t=>t.includes('성시간')},
  {key:'sinsim',     label:'성모신심', match:t=>t.includes('신심')},
  {key:'chanyang',   label:'찬미미사', match:t=>t.includes('찬미')||t.includes('찬양')},
];
function specialKindOf(title){ return SPECIAL_KINDS.find(k=>k.match(title))||null; }
/* 대대 자리 여부: '대'(big) 줄의 첫 칸(index 0)만 대대 — 대대제외 학생 불가.
   대소(big[1+])·소대·소소(small)는 대대제외 학생도 가능.
   자리가 1개뿐인 대 줄(2명 미사)도 그 자리가 대대. */
function isDaedaeSlot(kind, i){ return kind==='big' && i===0; }
/* 특정 연·월에서 특정 종류(key)의 특별미사들을 [{day, mass}] 로 반환 */
function findSpecialMasses(year, month, key){
  const out=[]; const mo=state.months[ym(year,month)];
  if(!mo||!mo.assign) return out;
  const days=Object.keys(mo.assign).map(Number).sort((a,b)=>a-b);
  for(const d of days){
    (mo.assign[d].masses||[]).forEach(ms=>{
      const k=specialKindOf(ms.title||''); if(k&&k.key===key) out.push({day:d, mass:ms});
    });
  }
  return out;
}
/* 미사 종류 분류 (집계용): 새벽/평일/주일/특별 */
const MASS_CATEGORIES=[
  {key:'dawn',    label:'새벽', match:t=>t.includes('새벽')},
  {key:'special', label:'특별', match:t=>!!specialKindOf(t)},
  {key:'weekday', label:'평일', match:t=>t.includes('평일')},
  {key:'sunday',  label:'주일', match:t=>t.includes('주일')},  // 주일·주일 전야
];
function massCategory(title){
  const t=title||'';
  for(const c of MASS_CATEGORIES){ if(c.match(t)) return c.key; }
  return 'etc';
}
/* 그 연·월에 실제 배정된 이름이 하나라도 있는지(assign 키만 있고 이름이 없으면 false) */
function monthHasRealAssign(year, month){
  const mo=state.months[ym(year,month)];
  if(!mo||!mo.assign) return false;
  for(const d in mo.assign){
    const masses=(mo.assign[d]&&mo.assign[d].masses)||[];
    for(const ms of masses){
      if((ms.big&&ms.big.length)||(ms.small&&ms.small.length)) return true;
    }
  }
  return false;
}
/* 연도별 학생 배정 집계.
   반환: { total:{name:{1:n,...,12:n, sum:n}}, byCat:{cat:{name:{month:n,sum}}} } */
function buildAssignTally(year){
  const total={}; const byCat={};
  MASS_CATEGORIES.forEach(c=>byCat[c.key]={});
  byCat['etc']={};
  const add=(obj,name,m,cnt)=>{ cnt=cnt||1; obj[name]=obj[name]||{sum:0}; obj[name][m]=(obj[name][m]||0)+cnt; obj[name].sum+=cnt; };
  // 1) 실제 배정에서 집계
  for(let m=1;m<=12;m++){
    const key=ym(year,m); const mo=state.months[key]; if(!mo||!mo.assign)continue;
    Object.values(mo.assign).forEach(day=>{
      const masses=(day&&day.masses)||[];
      masses.forEach(ms=>{
        const cat=massCategory(ms.title);
        const all=[...(ms.big||[]),...(ms.small||[])];
        all.forEach(n=>{ if(!n)return; add(total,n,m,1); add(byCat[cat],n,m,1); });
      });
    });
  }
  // 2) 과거 누적 시드(엑셀 1~6월) 합산.
  //    정책: 그 달의 '실제 배정 총 인원'이 시드 총합 이상이면 실제 배정을 신뢰(시드 스킵),
  //    실제 배정이 시드보다 적으면(데이터 없음/불완전) 그 달은 시드로 대체한다.
  const seed=(typeof SEED_ASSIGN_COUNT!=='undefined' && SEED_ASSIGN_COUNT[year])||null;
  if(seed){
    // 월별 실제 배정 총합, 시드 총합 계산
    const realMonthTotal={}, seedMonthTotal={};
    for(const n in total){ for(const mk in total[n]){ if(mk==='sum')continue; const m=Number(mk); realMonthTotal[m]=(realMonthTotal[m]||0)+total[n][mk]; } }
    for(const name in seed){ for(const cat in seed[name]){ for(const mk in seed[name][cat]){ const m=Number(mk); seedMonthTotal[m]=(seedMonthTotal[m]||0)+(seed[name][cat][mk]||0); } } }
    for(let m=1;m<=12;m++){
      const real=realMonthTotal[m]||0, sd=seedMonthTotal[m]||0;
      if(sd===0) continue;            // 시드에 그 달 없음
      if(real>=sd) continue;          // 실제 배정이 시드 이상 → 실제 배정 신뢰, 시드 스킵
      // 실제 배정이 시드보다 적음 → 그 달은 시드로 대체(실제 집계분 제거 후 시드 적용)
      for(const n in total){ if(total[n][m]){ total[n].sum-=total[n][m]; delete total[n][m]; } }
      for(const cat in byCat){ for(const n in byCat[cat]){ if(byCat[cat][n][m]){ byCat[cat][n].sum-=byCat[cat][n][m]; delete byCat[cat][n][m]; } } }
      for(const name in seed){
        const rec=seed[name];
        for(const cat in rec){
          const cnt=rec[cat][String(m)]||0; if(!cnt)continue;
          add(total,name,m,cnt);
          if(byCat[cat]) add(byCat[cat],name,m,cnt);
        }
      }
    }
  }
  return {total, byCat};
}
/* 특정 연도의 월별 특별미사 누적 집계.
   반환: { seongsigan:{1:[이름..],2:[...]}, sinsim:{...}, chanyang:{...} }
   = 실제 배정(state.months) 집계 + 수동 보정(state.specialLog[year]) 합산 */
function buildSpecialTally(year){
  const tally={}; SPECIAL_KINDS.forEach(k=>{tally[k.key]={};});
  const man=(state.specialLog&&state.specialLog[year])||{};
  // 특별미사 누적표는 '수동 기록(specialLog)'을 정본으로 사용한다.
  // (정기 배정표의 성모신심 등에는 일반 복사도 다수 배정되므로, 실제 배정을 그대로 세면 명단이 폭증함)
  // 판단은 '미사 종류별'로 따로 한다: 그 달·그 종류에 수동 기록이 있으면 그것만 쓰고,
  // 기록이 없는 종류만 그 달 실제 배정으로 보완한다.
  for(let m=1;m<=12;m++){
    // 실제 배정에서 종류별로 모아두기(보완용)
    let realByKind=null;
    if(monthHasRealAssign(year,m)){
      realByKind={};
      const mo=state.months[ym(year,m)];
      if(mo&&mo.assign) Object.values(mo.assign).forEach(day=>{
        ((day&&day.masses)||[]).forEach(ms=>{
          const k=specialKindOf(ms.title||''); if(!k)return;
          (realByKind[k.key]=realByKind[k.key]||[]);
          [...(ms.big||[]),...(ms.small||[])].forEach(n=>{ if(n && !realByKind[k.key].includes(n)) realByKind[k.key].push(n); });
        });
      });
    }
    SPECIAL_KINDS.forEach(k=>{
      const logged=(man[k.key]&&man[k.key][m])||null;
      if(logged && logged.length){
        tally[k.key][m]=logged.slice();                 // 수동 기록 우선(정본)
      } else if(realByKind && realByKind[k.key] && realByKind[k.key].length){
        tally[k.key][m]=realByKind[k.key].slice();       // 기록 없는 종류만 실제 배정으로 보완
      }
    });
  }
  return tally;
}
/* 누적표에서 특정 칸의 '수동 추가' 이름 목록 (실제 배정으로 들어온 것과 구분) */
function manualNames(year,key,m){
  return ((state.specialLog&&state.specialLog[year]&&state.specialLog[year][key]&&state.specialLog[year][key][m])||[]).slice();
}
function autoNames(year,key,m){
  const set=[]; const monthKey=ym(year,m); const mo=state.months[monthKey];
  if(mo&&mo.assign) Object.values(mo.assign).forEach(day=>{
    const masses=(day&&day.masses)||[];
    masses.forEach(ms=>{
      const k=specialKindOf(ms.title||''); if(!k||k.key!==key)return;
      const all=[...(ms.big||[]),...(ms.small||[])];
      all.forEach(n=>{ if(n&&!set.includes(n))set.push(n); });
    });
  });
  return set;
}
function eligible(person, mass){
  if(person.excluded) return false;
  const t=mass.title;
  const q=person.q||{};
  // ① 특별미사: 자격(1 표기) 있는 학생만. 학년 제한 등 다른 규칙보다 상위.
  const cap=specialCap(t);
  if(cap){ return !!q[cap]; }
  // ②-A 방학미사: 그 날 방학중 학교 ∩ 봉사학년 학생만 (날짜는 mass._d로 전달)
  if(t.includes('방학')){
    if(mass._y && mass._d){
      const schools=vacationSchoolsOn(mass._y, mass._m, mass._d);
      const grades=new Set(vacationCfg().grades||[]);
      return schools.has(person.school) && grades.has(person.grade);
    }
    // 날짜 정보 없으면 학년만이라도 확인(봉사학년)
    return new Set(vacationCfg().grades||[]).has(person.grade);
  }
  // ② 일반(정기)미사: 관리자가 설정한 배정 학년만
  const rk=routineKindOf(t);
  if(rk){
    const allow=massGrades()[rk]||[];
    if(!allow.includes(person.grade)) return false;
  }
  return true;
}
/* 자동배정.
   opts = { targets:{name:목표횟수}, exclude:Set(이름), minGapDays, weekUnique }
   - 간격 분산: 같은 주(일~토) 중복 회피 + 최소 간격(minGapDays) 확보
   - 초4 최소 2회 보장(2차 패스)
   - targets 초과자는 후순위(소프트 상한) */
function autoAssign(opts){
  opts = opts||{};
  const minGap = opts.minGapDays!=null ? opts.minGapDays : 3;   // 최소 간격(일)
  const weekUnique = opts.weekUnique!==false;                    // 같은 주 1회 우선
  const targets = opts.targets||{};
  const exclude = opts.exclude||new Set();
  const mo=getMonth();
  const counts={}; state.roster.forEach(p=>counts[p.name]=0);
  const lastDay={};   // 이름→마지막 배정 날짜
  const weekSet={};   // 이름→배정된 주차 Set
  const dawnCount={};
  const prevDawn=loadPrevDawnSet();
  const [yy,mm]=state.ym.split('-').map(Number);
  const weekOf=d=>{ const dow=new Date(yy,mm-1,d).getDay(); return Math.floor((d - (dow))/7); }; // 같은 일요일주 묶음
  const weekKey=d=>{ const dt=new Date(yy,mm-1,d); const dow=dt.getDay(); const sun=d-dow; return sun; }; // 그 주 일요일의 '일'(음수 가능)
  const days=Object.keys(mo.assign).map(Number).sort((a,b)=>a-b);

  function scoreOf(p,d,isDawn,isSpecial,kind){
    let c=counts[p.name];
    // 후순위 학년: 우선 학년이 다 찼을 때만 뽑히도록 큰 패널티(다른 패널티보다 우선)
    if(isLowerPriorityGrade(kind, p.grade)) c += 1000;
    // 특별미사(성시간·성모신심·찬미·어린이): 자격자끼리 '균등 분배'만 적용. 간격/주차 패널티 면제.
    if(isSpecial) return c;
    // 목표 횟수 초과자는 후순위(소프트). 목표 도달할수록 점수↑
    const tg=targets[p.name];
    if(tg!=null && counts[p.name]>=tg) c += 100 + (counts[p.name]-tg);
    if(isDawn && prevDawn.has(p.name)) c += 0.5;
    // 같은 주 이미 배정 → 큰 패널티(다른 후보 없을 때만 선택되게)
    if(weekUnique && weekSet[p.name] && weekSet[p.name].has(weekKey(d))) c += 50;
    // 최소 간격 미달 → 패널티(간격이 가까울수록 큼)
    if(lastDay[p.name]!=null){ const gap=d-lastDay[p.name];
      if(gap < minGap) c += (minGap-gap)*10; }
    return c;
  }
  function assignOne(arr,i,d,mass,kind,isDawn,isVigil,relax){
    const isSpecial = !!specialCap(mass.title);   // 성시간·성모신심·찬미(균등분배만)
    const isVacation = (mass.title||'').includes('방학'); // 방학미사: 자격상위지만 간격은 유의
    const base=(p,ignoreMax)=>{
      if(exclude.has(p.name)) return false;
      if(usedTodayRef.has(p.name)) return false;
      // 대대제외: '대대' 자리(대 줄 첫 칸)만 불가. 대소·소 자리는 가능 (연말 대복사 수업 전까지 대대만 금지)
      if(isDaedaeSlot(kind,i) && p.noDaedae) return false;
      if(isDawn){ if((dawnCount[p.name]||0)>=1) return false; }
      // 학년별 최대 상한 — 방학·특별미사 포함 모든 미사에 적용(전체 횟수가 max 초과 금지)
      if(!ignoreMax){
        const mx=limitFor(p.grade).max;
        if(counts[p.name] >= mx) return false;
      }
      return true;
    };
    // 1차: 상한 지킴 → 2차(전야 한정): 학년범위 확장하되 상한은 유지.
    // ※ 학년 최대치(max)는 절대 초과하지 않음 — 후보가 없으면 빈자리로 남김.
    let cands=state.roster.filter(p=>base(p,false)&&eligible(p,mass));
    if(!cands.length&&isVigil) cands=state.roster.filter(p=>base(p,false)&&!p.excluded&&inRange(p.grade,'초4','고3'));
    if(!cands.length) return '';
    // 방학미사는 간격 분산을 적용(scoreOf 일반 경로), 특별미사만 균등분배-only
    const rkind=routineKindOf(mass.title);
    let scored=cands.map(p=>({p,s:scoreOf(p,d,isDawn,isSpecial,rkind)}));
    const min=Math.min(...scored.map(x=>x.s));
    const pool=scored.filter(x=>x.s===min).map(x=>x.p);
    const pick=pool[Math.floor(Math.random()*pool.length)];
    counts[pick.name]++; lastDay[pick.name]=d;
    (weekSet[pick.name]=weekSet[pick.name]||new Set()).add(weekKey(d));
    if(isDawn) dawnCount[pick.name]=(dawnCount[pick.name]||0)+1;
    return pick.name;
  }
  let usedTodayRef=new Set();
  for(const d of days){
    usedTodayRef=new Set();
    for(const mass of mo.assign[d].masses){
      // 방학미사 자격 판정을 위해 날짜 정보 부여(임시)
      mass._y=yy; mass._m=mm; mass._d=d;
      const isDawn=mass.title.includes('새벽');
      const isVigil=mass.title.includes('전야');
      // 특별미사(성시간·성모신심·찬미)는 '특별미사 설정'에서 미리 지정한 배정을 보존.
      // 이미 채워진 칸은 자동배정이 덮어쓰지 않고, 그 학생을 카운트·중복방지에만 반영하고 빈칸만 채움.
      const preserve = !!specialCap(mass.title);
      const keepFilled=(arr,kind,i)=>{
        const nm=arr[i];
        if(!nm) return false;            // 빈칸 → 자동배정 대상
        // 기존 이름 보존: 카운트·당일중복·새벽카운트·주차·간격에 반영
        counts[nm]=(counts[nm]||0)+1; lastDay[nm]=d;
        (weekSet[nm]=weekSet[nm]||new Set()).add(weekKey(d));
        if(isDawn) dawnCount[nm]=(dawnCount[nm]||0)+1;
        usedTodayRef.add(nm);
        return true;                     // 보존됨 → 자동배정 건너뜀
      };
      for(let i=0;i<mass.big.length;i++){
        if(preserve && keepFilled(mass.big,'big',i)) continue;
        const nm=assignOne(mass.big,i,d,mass,'big',isDawn,isVigil); mass.big[i]=nm; if(nm)usedTodayRef.add(nm);
      }
      for(let i=0;i<mass.small.length;i++){
        if(preserve && keepFilled(mass.small,'small',i)) continue;
        const nm=assignOne(mass.small,i,d,mass,'small',isDawn,isVigil); mass.small[i]=nm; if(nm)usedTodayRef.add(nm);
      }
      // 임시 날짜 정보 제거(저장 데이터 오염 방지)
      delete mass._y; delete mass._m; delete mass._d;
    }
  }
  // 초4 최소 2회 보장: 부족한 초4를 가장 적합한 자리에 추가 투입(같은날 중복·자격·대대제외 지킴)
  enforceMinCounts(counts, lastDay, weekSet, weekKey);
  mo.updated=Date.now();
  return counts;
}
/* 초4 최소 2회 보장 패스 */
function enforceMinCounts(counts, lastDay, weekSet, weekKey){
  const mo=getMonth();
  // 학년별 최소(min) 미달자 전체 대상 (min>0인 학년만)
  const need = state.roster.filter(p=>!p.excluded && (counts[p.name]||0) < limitFor(p.grade).min);
  if(!need.length) return;
  const days=Object.keys(mo.assign).map(Number).sort((a,b)=>a-b);
  for(const p of need){
    const myMin=limitFor(p.grade).min;
    const myMax=limitFor(p.grade).max;
    let guard=0;
    // 최소 채우기라도 자기 학년 최대치는 넘지 않음
    while((counts[p.name]||0) < myMin && (counts[p.name]||0) < myMax && guard++ < 50){
      let best=null;
      for(const d of days){
        const usedToday=new Set();
        mo.assign[d].masses.forEach(x=>[...x.big,...x.small].forEach(n=>n&&usedToday.add(n)));
        if(usedToday.has(p.name)) continue;
        for(const mass of mo.assign[d].masses){
          if(!eligible(p,mass)) continue;
          if(specialCap(mass.title)) continue; // 특별미사 자리는 최소보장 대상에서 제외(자격 상위)
          const kinds = ['small','big'];
          for(const kind of kinds){
            const arr=mass[kind];
            for(let i=0;i<arr.length;i++){
              // 대대제외 학생은 대대 자리(big[0])만 회피
              if(p.noDaedae && isDaedaeSlot(kind,i)) continue;
              const cur=arr[i];
              // 빈자리거나, 현재 점유자가 자기 학년 최소보다 많이 섰으면 교체 가능
              const replaceable = !cur || (counts[cur]||0) > limitFor((state.roster.find(r=>r.name===cur)||{}).grade||'').min;
              if(!replaceable) continue;
              const wk=weekKey(d);
              const sameWeek = weekSet[p.name] && weekSet[p.name].has(wk);
              const score = (cur?1:0) + (sameWeek?5:0) + (lastDay[p.name]!=null?Math.max(0,3-(Math.abs(d-lastDay[p.name]))):0);
              if(!best || score < best.score){ best={d,mass,kind,i,cur,score,wk}; }
            }
          }
        }
      }
      if(!best) break;
      if(best.cur){ counts[best.cur]=(counts[best.cur]||0)-1; }
      best.mass[best.kind][best.i]=p.name;
      counts[p.name]=(counts[p.name]||0)+1;
      lastDay[p.name]=best.d;
      (weekSet[p.name]=weekSet[p.name]||new Set()).add(best.wk);
    }
  }
}
function loadPrevDawnSet(){
  const [y,m]=state.ym.split('-').map(Number);
  const pm=ym(m===1?y-1:y, m===1?12:m-1);
  const set=new Set();
  const prev=state.months[pm];
  if(prev) Object.values(prev.assign).forEach(day=>day.masses.forEach(ms=>{
    if(ms.title.includes('새벽')) [...ms.big,...ms.small].forEach(n=>n&&set.add(n));
  }));
  return set;
}
/* 규칙 기반 목표 횟수 추정: 각 미사 자리를 자격자 수로 나눠 1/n씩 기대치를 누적 → 반올림.
   초4는 최소 2회로 보정. 배정제외는 0. */
function estimateTargets(){
  const mo=getMonth();
  const exp={}; state.roster.forEach(p=>exp[p.name]=0);
  const days=Object.keys(mo.assign).map(Number);
  for(const d of days){
    for(const mass of mo.assign[d].masses){
      const isDawn=mass.title.includes('새벽');
      ['big','small'].forEach(kind=>{
        const slots=mass[kind].length; if(!slots)return;
        let cand=state.roster.filter(p=>!p.excluded && eligible(p,mass) && !(kind==='big'&&p.noDaedae));
        if(!cand.length)return;
        const share=slots/cand.length;
        cand.forEach(p=>exp[p.name]+=share);
      });
    }
  }
  const targets={};
  state.roster.forEach(p=>{
    if(p.excluded){ targets[p.name]=0; return; }
    let t=Math.round(exp[p.name]);
    const lim=limitFor(p.grade);
    if(t<lim.min) t=lim.min;   // 학년 최소 보장
    if(t>lim.max) t=lim.max;   // 학년 최대 제한
    targets[p.name]=t;
  });
  return targets;
}

/* ====================== FIREBASE (optional) ====================== */
let fb=null,fbdb=null;
let _applyingRemote=false;   // 원격 수신 반영 중 플래그(에코 방지)
let _pushTimer=null;         // 디바운스 타이머
async function initFirebase(){
  if(!FIREBASE_CONFIG||!FIREBASE_CONFIG.databaseURL) return;
  try{
    const app=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const db=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    fb=app.initializeApp(FIREBASE_CONFIG); fbdb=db.getDatabase(fb);
    window._fbdb=db;
    const pill=document.getElementById('syncPill');
    pill.textContent='실시간 연결 중…';

    // 최초 1회: DB가 비어 있으면 현재(로컬) 데이터를 올려 초기화
    const rootRef=db.ref(fbdb,'/');
    const snap=await db.get(rootRef);
    if(!snap.exists()){
      await db.set(rootRef,{roster:state.roster, months:state.months, specialLog:state.specialLog||{}, gradeLimits:state.gradeLimits||null, vacation:state.vacation||null, massGrades:state.massGrades||null, massPriority:state.massPriority||null, laundry:state.laundry||{}, notices:state.notices||[], lastModified:state.lastModified||null});
    }

    // 실시간 수신: 다른 기기/사용자의 변경을 즉시 반영
    db.onValue(rootRef,snap=>{
      const v=snap.val();
      if(!v) return;
      _applyingRemote=true;
      if(v.roster) state.roster=v.roster;
      state.months = v.months || {};
      // 시드 달(1~6월) 보충: DB에 없거나 비어 있으면 시드로 채우고 곧바로 올림
      let seedMonthsPushed=false;
      if(typeof SEED_MONTHS!=='undefined'){
        for(const k in SEED_MONTHS){
          const [sy,sm]=k.split('-').map(Number);
          const cur=state.months[k];
          const empty = !cur || !cur.assign || !Object.keys(cur.assign).length || !monthHasRealAssign(sy,sm);
          if(empty){
            state.months[k]=JSON.parse(JSON.stringify(SEED_MONTHS[k]));
            if(state.months[k].published===undefined) state.months[k].published=true;
            seedMonthsPushed=true;
          }
        }
      }
      // 누적 기록: DB에 있으면 사용, 없으면 기존 시드(1~6월) 유지하고 곧바로 올림
      if(v.specialLog){ state.specialLog = v.specialLog; }
      else if(!state.specialLog || !Object.keys(state.specialLog).length){
        state.specialLog = JSON.parse(JSON.stringify(SEED_SPECIAL_LOG));
      }
      const seedNeedsPush = seedMonthsPushed || (!v.specialLog && state.specialLog && Object.keys(state.specialLog).length);
      state.gradeLimits = v.gradeLimits || null;
      if(v.vacation) state.vacation = v.vacation;
      if(v.massGrades) state.massGrades = v.massGrades;
      if(v.massPriority) state.massPriority = v.massPriority;
      if(v.laundry) state.laundry = v.laundry;
      if(v.notices) state.notices = v.notices;
      if(v.lastModified) state.lastModified = v.lastModified;
      updateLastMod();
      // 로컬 캐시도 갱신(오프라인 대비)
      try{ localStorage.setItem('asn_roster',JSON.stringify(state.roster));
           localStorage.setItem('asn_months',JSON.stringify(state.months));
           localStorage.setItem('asn_speciallog',JSON.stringify(state.specialLog||{}));
           localStorage.setItem('asn_gradelimits',JSON.stringify(state.gradeLimits||null));
           localStorage.setItem('asn_laundry',JSON.stringify(state.laundry||{}));
           localStorage.setItem('asn_notices',JSON.stringify(state.notices||[])); }catch(e){}
      _applyingRemote=false;
      ensureViewableMonth();
      render();
      if(seedNeedsPush) syncPush(); // DB에 누적 시드가 없던 경우 한 번 업로드
    });
    // 연결 상태 표시
    const connRef=db.ref(fbdb,'.info/connected');
    db.onValue(connRef,s=>{
      const on=s.val()===true;
      pill.textContent = on?'실시간 동기화':'오프라인(자동 재연결)';
      pill.classList.toggle('on',on);
    });
  }catch(e){ console.warn('Firebase init failed, local mode',e);
    const pill=document.getElementById('syncPill'); if(pill) pill.textContent='로컬 저장';
  }
}
function syncPush(){
  if(!fb||!window._fbdb||_applyingRemote) return;  // 원격 반영 중에는 다시 올리지 않음(에코 방지)
  const db=window._fbdb;
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(()=>{
    db.set(db.ref(fbdb,'/'),{roster:state.roster,months:state.months,specialLog:state.specialLog||{},gradeLimits:state.gradeLimits||null,vacation:state.vacation||null,massGrades:state.massGrades||null,massPriority:state.massPriority||null,laundry:state.laundry||{},notices:state.notices||[],lastModified:state.lastModified||null}).catch(e=>console.warn('sync push failed',e));
  },250); // 짧은 디바운스로 연속 저장 합치기
}

const $=s=>document.querySelector(s);
function setView(v){
  state.view=v;
  if(v!=='schedule'&&pickMode){pickMode=null;pickFirst=null;hidePickBanner();}
  ['schedule','requests','roster','logs'].forEach(x=>{
    $('#view-'+x).style.display = x===v?'block':'none';});
  document.querySelectorAll('.bnav button').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  if(v==='roster'){ rosterYM=state.ym; renderRoster(); }
  if(v==='requests') renderRequests();
  if(v==='logs') renderLogs();
  if(v==='schedule') renderSchedule();
  window.scrollTo(0,0);
}
function render(){
  document.body.classList.toggle('admin',state.isAdmin);
  document.querySelectorAll('.admin-act').forEach(b=>b.style.display=state.isAdmin?'inline-flex':'none');
  const mb=document.getElementById('maintBar'); if(mb) mb.style.display=state.isAdmin?'block':'none';
  if(state.view==='schedule') renderSchedule();
  else setView(state.view);
}
function fmtUpdated(ts){ if(!ts)return'-'; const d=new Date(ts);
  return `${d.getMonth()+1}월 ${d.getDate()}일 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

function renderSchedule(){
  const [y,m]=state.ym.split('-').map(Number);
  $('#monthTitle').textContent=`${y}년 ${m}월`;
  const mo=getMonth();
  $('#updatedAt').textContent='최종 변경: '+fmtUpdated(mo.updated);
  // 배포 버튼 라벨/상태(관리자만 보임)
  const published=isPublished(state.ym);
  const pubBtn=document.getElementById('publishBtn');
  if(pubBtn){
    if(published){ pubBtn.textContent='✅ 배포됨 (취소)'; pubBtn.classList.add('published'); }
    else { pubBtn.textContent='📢 배정표 배포'; pubBtn.classList.remove('published'); }
  }
  // 관리자에게 배포 상태 안내 표시
  const banner=document.getElementById('pubBanner');
  if(banner){
    if(state.isAdmin && !published){
      banner.style.display='block';
      banner.classList.remove('ok');
      banner.textContent=`⚠ 이 달은 아직 배포 전입니다. 일반 사용자에게는 보이지 않습니다.`;
    } else if(state.isAdmin && published){
      banner.style.display='block';
      banner.classList.add('ok');
      banner.textContent=`✅ 배포됨 — 일반 사용자가 이 달을 볼 수 있습니다.`;
    } else {
      banner.style.display='none';
      banner.classList.remove('ok');
    }
  }
  $('#segCal').classList.toggle('on',state.mode==='cal');
  $('#segList').classList.toggle('on',state.mode==='list');
  if(state.mode==='cal'){ $('#calView').style.display='block'; $('#listView').style.display='none'; renderCal(y,m,mo);}
  else { $('#calView').style.display='none'; $('#listView').style.display='flex'; renderList(y,m,mo);}
  // 미저장 자동배정 배너 유지/숨김
  const pb=document.getElementById('pendingBar');
  if(pb) pb.style.display = _autoPending ? 'flex' : 'none';
}
function renderCal(y,m,mo){
  const first=new Date(y,m-1,1).getDay();
  const last=new Date(y,m,0).getDate();
  let h='<div class="calscroll"><div class="calinner"><div class="calhead">'+WD.map(w=>`<div>${w}</div>`).join('')+'</div><div class="cal">';
  for(let i=0;i<first;i++) h+='<div class="cell empty"></div>';
  for(let d=1;d<=last;d++){
    const date=new Date(y,m-1,d); const w=date.getDay();
    const isToday=(y===today.getFullYear()&&m===today.getMonth()+1&&d===today.getDate());
    h+=`<div class="cell ${w===0?'sun':''} ${isToday?'today':''}"><div class="dnum">${d}</div>`;
    const day=mo.assign[d];
    if(day) day.masses.forEach(ms=>{
      const c=COLOR_NAME[ms.color]||COLOR_NAME['녹'];
      const massClick = pickMode? '' : `onclick="openMass(${d},'${ms.id}')"`;
      const ttl = isSpecialMass(ms.title)? `<div class="mttl">${ms.title}</div>`:'';
      h+=`<div class="mass" ${massClick}>
        ${ttl}<div class="mt"><span class="clbl ${c.lblcls}">${c.lbl}</span>${ms.time}</div>
        ${slotGrid(ms,d)}</div>`;
    });
    if(state.isAdmin && !pickMode) h+=`<button class="addmass" onclick="addMass(${d})">＋ 미사</button>`;
    h+='</div>';
  }
  h+='</div></div></div>';
  $('#calView').innerHTML=h;
}
function nameSpan(n,d,mid,k,i,showRole){
  if(!n){
    // 선택 모드(맞교환 두 번째 단계)에서는 빈자리도 탭 가능
    if(pickMode==='swap'&&pickFirst) return `<span class="empty tapn" onclick="event.stopPropagation();pickName(${d},'${mid}','${k}',${i})">·</span>`;
    return '<span class="empty">·</span>';
  }
  const chg=isChanged(d,mid,n);
  const first=isPickedFirst(d,mid,k,i);
  const cls=[chg?'chg':'', first?'pickedfirst':'', pickMode?'tapn':''].filter(Boolean).join(' ');
  const tap = pickMode? `onclick="event.stopPropagation();pickName(${d},'${mid}','${k}',${i})"`:'';
  const role = k==='big'?'대':'소';
  const prefix = showRole? `<span class="rolep">${role}</span>` : '';
  return `<span class="${cls}" ${tap}>${prefix}${n}</span>`;
}
function slotGrid(ms,d){
  const hasAny=[...ms.big,...ms.small].some(Boolean);
  if(!hasAny && !pickMode) return '<div class="who"><i>미배정</i></div>';
  let h='<div class="who grid">';
  // 윗줄: 대 (대대=앞, 대소=뒤) / 아랫줄: 소 (소대=앞, 소소=뒤)
  // 대/소 표시는 각 줄의 첫 이름에만 붙임(예: 대 김재윤 이예나 / 소 구현비 이지안4)
  let firstBig=true;
  ms.big.forEach((n,i)=>{ const show=firstBig&&!!n; if(n)firstBig=false; h+=nameSpan(n,d,ms.id,'big',i,show); });
  // 대가 홀수면 빈칸을 채워 소가 항상 새 줄에서 시작하도록 함
  if(ms.big.length%2===1 && ms.small.length>0) h+='<span class="empty"></span>';
  let firstSmall=true;
  ms.small.forEach((n,i)=>{ const show=firstSmall&&!!n; if(n)firstSmall=false; h+=nameSpan(n,d,ms.id,'small',i,show); });
  h+='</div>';
  return h;
}
function tag(n,lbl,ms,d){ if(!n) return ''; const chg=isChanged(d,ms.id,n);
  return `<span class="${chg?'chg':''}">${n}</span>`;}
function isChanged(d,mid,name){ const mo=getMonth();
  return (mo.changedNames||[]).includes(d+'|'+mid+'|'+name);}

function renderList(y,m,mo){
  const last=new Date(y,m,0).getDate();
  let h='';
  for(let d=1;d<=last;d++){

    const date=new Date(y,m-1,d); const w=date.getDay();
    const lit=litColor(date);
    h+=`<div class="daycard"><div class="dh">
        <span class="dd">${m}/${d}</span>
        <span class="dw ${w===0?'sun':''}">(${WD[w]})</span>
        <span class="lit">${lit.title||''}</span></div>`;
    if(hasMass) day.masses.forEach(ms=>{
      const c=COLOR_NAME[ms.color]||COLOR_NAME['녹'];
      h+=`<div class="massrow"><div class="top">
          <span class="clbl ${c.lblcls}">${c.lbl}</span>
          <span class="time">${ms.time}</span>
          <span class="ttl">${ms.title}</span>
          ${state.isAdmin && !pickMode?`<button class="editbtn" onclick="openMass(${d},'${ms.id}')">편집</button>`:''}</div>
          <div class="roles">`;
      const slot=(n,lbl,k,i)=>{ const chg=isChanged(d,ms.id,n);
        const first=isPickedFirst(d,ms.id,k,i);
        const tap=pickMode?`onclick="pickName(${d},'${ms.id}','${k}',${i})" style="cursor:pointer"`:'';
        if(!n){
          const tapVac=(pickMode==='swap'&&pickFirst)?`onclick="pickName(${d},'${ms.id}','${k}',${i})" style="cursor:pointer"`:'';
          return `<span class="role empty" ${tapVac}><span class="lbl">${lbl}</span>비어있음</span>`;
        }
        return `<span class="role ${first?'pickedfirst':''}" ${tap}><span class="lbl">${lbl}</span><span class="nm ${chg?'chg':''}">${n}</span></span>`;};
      ms.big.forEach((n,i)=>h+=slot(n,'대','big',i)); ms.small.forEach((n,i)=>h+=slot(n,'소','small',i));
      h+=`</div></div>`;
    });
    if(state.isAdmin && !pickMode){
      h+=`<div class="massrow addrow"><button class="addmass list" onclick="addMass(${d})">＋ 이 날에 미사 추가</button></div>`;
    }
    h+='</div>';
  }
  $('#listView').innerHTML=h||'<div class="empty-state">이 달의 배정이 없습니다. 관리자가 \'새 달 만들기\'로 생성하세요.</div>';
}

/* ====================== SHEET HELPERS ====================== */
function openSheet(title,bodyHtml){
  $('#sheet').innerHTML=`<div class="sh"><h3>${title}</h3><button class="x" onclick="closeSheet()">✕</button></div><div class="sbody">${bodyHtml}</div>`;
  $('#scrim').classList.add('show');
}
function closeSheet(){$('#scrim').classList.remove('show');}
$('#scrim').addEventListener('click',e=>{if(e.target===$('#scrim'))closeSheet();});
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

/* ====================== MASS DETAIL / EDIT ====================== */
function findMass(d,mid){const mo=getMonth();const day=mo.assign[d];if(!day)return null;
  return day.masses.find(x=>x.id===mid);}
window.openMass=function(d,mid){
  const ms=findMass(d,mid); if(!ms)return;
  if(state.isAdmin) editMass(d,mid); else viewMass(d,mid);
};
function viewMass(d,mid){
  const ms=findMass(d,mid); const c=COLOR_NAME[ms.color]||COLOR_NAME['녹'];
  let h=`<div class="note">${state.ym.split('-')[1]}월 ${d}일 · ${ms.time} · ${c.k}색</div>`;
  h+='<div class="roles" style="margin-bottom:12px">';
  ms.big.forEach(n=>h+=`<span class="role"><span class="lbl">대</span>${n||'-'}</span>`);
  ms.small.forEach(n=>h+=`<span class="role"><span class="lbl">소</span>${n||'-'}</span>`);
  h+='</div>';
  h+=`<button class="btnfull" onclick="closeSheet();openSwap()">맞교환 신청</button>`;
  h+=`<button class="btnfull ghost" onclick="closeSheet();openSub()">대타 신청</button>`;
  openSheet(`${ms.title}`,h);
}
function editMass(d,mid){
  const ms=findMass(d,mid);
  const opts=['<option value="">— 비움 —</option>'].concat(
    state.roster.map(p=>`<option value="${p.name}">${p.name} (${p.grade})</option>`)).join('');
  // 미사 유형 프리셋(제목을 자동으로 채워 자격 규칙이 따라오게)
  const TYPES=['성시간','성모신심','찬미미사','새벽미사','평일미사','주일미사','주일 전야미사'];
  const curType = TYPES.includes(ms.title) ? ms.title : '';
  let h=`<div class="field"><label>미사 유형 (자격 규칙이 제목을 따라갑니다)</label>
    <select id="m_type" onchange="onTypeChange()">
      <option value="">— 직접 입력 —</option>
      ${TYPES.map(t=>`<option value="${t}" ${curType===t?'selected':''}>${t}</option>`).join('')}
    </select></div>`;
  h+=`<div class="field"><label>미사 제목</label><input id="m_title" value="${ms.title}"></div>
    <div class="row2"><div class="field"><label>시간</label><input id="m_time" value="${ms.time}"></div>
    <div class="field"><label>전례색</label><select id="m_color">
      ${['홍','녹','백','자'].map(c=>`<option value="${c}" ${ms.color===c?'selected':''}>${COLOR_NAME[c].k}</option>`).join('')}
    </select></div></div>`;
  h+='<div class="sectitle">대 복사 (대대 포함)</div>';
  ms.big.forEach((n,i)=>h+=slotRow('big',i,n,opts));
  h+=`<button class="tbtn" onclick="addSlot('${d}','${mid}','big')">＋ 대 자리 추가</button>`;
  h+='<div class="sectitle">소 복사</div>';
  ms.small.forEach((n,i)=>h+=slotRow('small',i,n,opts));
  h+=`<button class="tbtn" onclick="addSlot('${d}','${mid}','small')">＋ 소 자리 추가</button>`;
  h+=`<button class="btnfull" onclick="saveMass(${d},'${mid}')">저장</button>
      <button class="btnfull ghost" onclick="moveMassPrompt(${d},'${mid}')">📅 다른 날로 이동</button>
      <button class="btnfull ghost" onclick="fillEmpty(${d},'${mid}')">빈자리 자동 채우기</button>
      <button class="btnfull danger" onclick="deleteMass(${d},'${mid}')">미사 삭제</button>`;
  openSheet('미사 편집',h);
}
// 유형 선택 시 제목 자동 채움(자격 규칙은 제목 기반이라 이걸로 따라옴)
window.onTypeChange=function(){
  const ty=$('#m_type').value;
  if(ty){ $('#m_title').value=ty; }
};
// 미사를 다른 날로 이동(배정 인원 유지)
window.moveMassPrompt=function(d,mid){
  const ms=findMass(Number(d),mid); if(!ms)return;
  syncSheetToMass(ms); // 현재 편집 상태 보존
  const [y,m]=state.ym.split('-').map(Number);
  const last=new Date(y,m,0).getDate();
  let h=`<div class="note">${m}월 ${d}일 · ${ms.title||'미사'} (${ms.time})을 같은 달의 다른 날로 옮깁니다. 배정된 복사와 제목·시간은 그대로 유지됩니다.</div>`;
  h+='<div class="field"><label>옮길 날짜</label><div class="daygrid">';
  for(let dd=1;dd<=last;dd++){
    const wd=WD[new Date(y,m-1,dd).getDay()];
    h+=`<button class="dchip ${dd===Number(d)?'cur':''}" onclick="moveMass(${d},'${mid}',${dd})">${dd}<i>${wd}</i></button>`;
  }
  h+='</div></div>';
  h+=`<button class="btnfull ghost" onclick="editMass(${d},'${mid}')">← 편집으로</button>`;
  openSheet('다른 날로 이동',h);
};
window.moveMass=function(d,mid,toDay){
  d=Number(d); toDay=Number(toDay);
  if(d===toDay){ editMass(d,mid); return; }
  const mo=getMonth();
  const day=mo.assign[d]; if(!day)return;
  const idx=day.masses.findIndex(x=>x.id===mid); if(idx<0)return;
  const ms=day.masses[idx];
  // 원래 날에서 제거
  day.masses.splice(idx,1);
  if(!day.masses.length) delete mo.assign[d];
  // 대상 날에 추가
  if(!mo.assign[toDay]) mo.assign[toDay]={masses:[]};
  mo.assign[toDay].masses.push(ms);
  mo.assign[toDay].masses.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  mo.updated=Date.now();
  addAdminLog(`미사 이동 — ${ms.title||'미사'} ${d}일→${toDay}일`);
  save(); closeSheet(); renderSchedule(); toast(`${toDay}일로 옮겼습니다`);
};
function slotRow(kind,i,n,opts){
  const sel=String(n||'');
  // 현재 배정된 이름(n)에 selected를 직접 부여
  const optHtml=['<option value="">— 비움 —</option>'].concat(
    state.roster.map(p=>`<option value="${p.name}" ${p.name===sel?'selected':''}>${p.name} (${p.grade})</option>`)).join('');
  return `<div class="slotedit"><span class="lbl">${kind==='big'?'대':'소'}${i+1}</span>
    <select data-kind="${kind}" data-i="${i}">${optHtml}</select>
    <button class="del" onclick="this.parentElement.remove()">🗑</button></div>`;
}
// 자리 추가: 현재 화면의 선택값을 ms에 먼저 반영한 뒤 한 칸 추가하고 다시 그림(기존 선택 유지)
window.addSlot=function(d,mid,kind){
  const ms=findMass(Number(d),mid);
  syncSheetToMass(ms);   // 현재 드롭다운 값들을 ms에 저장
  ms[kind].push('');
  editMass(Number(d),mid);
};
// 현재 시트의 입력 상태를 ms 객체에 반영(저장 전 임시 동기화)
function syncSheetToMass(ms){
  const t=$('#m_title'); if(t) ms.title=t.value;
  const tm=$('#m_time'); if(tm) ms.time=tm.value;
  const c=$('#m_color'); if(c) ms.color=c.value;
  const big=[],small=[];
  $('#sheet').querySelectorAll('select[data-kind]').forEach(s=>{
    (s.dataset.kind==='big'?big:small).push(s.value);});
  if($('#sheet').querySelector('select[data-kind]')){ ms.big=big; ms.small=small; }
}
window.saveMass=function(d,mid){
  const ms=findMass(d,mid);
  ms.title=$('#m_title').value.trim(); ms.time=$('#m_time').value.trim(); ms.color=$('#m_color').value;
  const big=[],small=[];
  $('#sheet').querySelectorAll('select[data-kind]').forEach(sel=>{
    (sel.dataset.kind==='big'?big:small).push(sel.value);});
  ms.big=big; ms.small=small;
  getMonth().updated=Date.now();
  addAdminLog(`미사 편집 — ${d}일 ${ms.time} ${ms.title}`);
  save(); closeSheet(); renderSchedule(); toast('저장되었습니다');
};
function restoreSelects(d,mid){
  const ms=findMass(d,mid);
  $('#sheet').querySelectorAll('select[data-kind]').forEach(sel=>{
    const arr=ms[sel.dataset.kind]; sel.value=arr[sel.dataset.i]||'';});
}
window.fillEmpty=function(d,mid){
  const ms=findMass(d,mid); const mo=getMonth();
  // current usage today
  const usedToday=new Set();
  mo.assign[d].masses.forEach(x=>[...x.big,...x.small].forEach(n=>n&&usedToday.add(n)));
  const counts={}; state.roster.forEach(p=>counts[p.name]=0);
  Object.values(mo.assign).forEach(day=>day.masses.forEach(x=>[...x.big,...x.small].forEach(n=>n&&(counts[n]=(counts[n]||0)+1))));
  const fill=(arr,kind)=>{for(let i=0;i<arr.length;i++){ if(arr[i])continue;
    let c=state.roster.filter(p=>!usedToday.has(p.name)&&eligible(p,ms)&&!(isDaedaeSlot(kind,i)&&p.noDaedae));
    if(!c.length)continue; let mn=Math.min(...c.map(p=>counts[p.name]||0));
    let pool=c.filter(p=>(counts[p.name]||0)===mn); const pk=pool[Math.floor(Math.random()*pool.length)];
    arr[i]=pk.name; usedToday.add(pk.name); counts[pk.name]=(counts[pk.name]||0)+1;}};
  fill(ms.big,'big'); fill(ms.small,'small');
  mo.updated=Date.now(); addAdminLog(`빈자리 채우기 — ${d}일 ${ms.time}`);
  save(); editMass(d,mid); toast('빈자리를 채웠습니다');
};
window.deleteMass=function(d,mid){
  if(!confirm('이 미사를 삭제할까요?'))return;
  const mo=getMonth(); const day=mo.assign[d];
  day.masses=day.masses.filter(x=>x.id!==mid);
  if(!day.masses.length) delete mo.assign[d];
  mo.updated=Date.now(); addAdminLog(`미사 삭제 — ${d}일`);
  save(); closeSheet(); renderSchedule(); toast('삭제했습니다');
};
/* 특정 날짜에 새 미사 추가 (수·금 포함 모든 날, 인원 제약 없음) */
window.addMass=function(d){
  d=Number(d);
  const [y,mm]=state.ym.split('-').map(Number);
  const date=new Date(y,mm-1,d);
  const lit=litColor(date);
  let h=`<div class="note">${mm}월 ${d}일 (${WD[date.getDay()]}) 에 새 미사를 추가합니다. 인원은 자유롭게 정할 수 있습니다.</div>`;
  const TYPES=['성시간','성모신심','찬미미사','새벽미사','평일미사','주일미사','주일 전야미사'];
  h+=`<div class="field"><label>미사 유형 (자격 규칙이 제목을 따라갑니다)</label>
    <select id="nm_type" onchange="onNewTypeChange()">
      <option value="">— 직접 입력 —</option>
      ${TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}
    </select></div>`;
  h+=`<div class="field"><label>미사 제목</label><input id="nm_title" placeholder="예: 평일미사, 대축일 미사, 방학 미사" value="평일미사"></div>`;
  h+=`<div class="row2"><div class="field"><label>시간</label><input id="nm_time" placeholder="예: 19:30" value="19:30"></div>
      <div class="field"><label>전례색</label><select id="nm_color">
        ${['홍','녹','백','자'].map(c=>`<option value="${c}" ${lit.color===c?'selected':''}>${COLOR_NAME[c].k}</option>`).join('')}
      </select></div></div>`;
  h+=`<div class="row2"><div class="field"><label>대 복사 인원</label><input id="nm_big" type="number" min="0" value="1"></div>
      <div class="field"><label>소 복사 인원</label><input id="nm_small" type="number" min="0" value="1"></div></div>`;
  h+=`<div class="help">성시간·성모신심·찬미미사로 지정하면 자격 있는 학생만 배정됩니다(시간·날짜와 무관). 대축일처럼 인원이 많은 미사는 숫자를 크게 적으세요.</div>`;
  h+=`<button class="btnfull" onclick="saveNewMass(${d})">미사 추가</button>`;
  openSheet('미사 추가',h);
};
window.onNewTypeChange=function(){
  const ty=$('#nm_type').value;
  if(!ty) return;
  $('#nm_title').value=ty;
  // 유형별 기본 시간 자동 채움(바꿔도 됨)
  const T={'성시간':'19:30','성모신심':'10:00','찬미미사':'19:30','새벽미사':'06:30','평일미사':'19:30','주일미사':'09:00','주일 전야미사':'17:00'};
  if(T[ty]) $('#nm_time').value=T[ty];
};
window.saveNewMass=function(d){
  d=Number(d);
  const title=$('#nm_title').value.trim()||'미사';
  const time=$('#nm_time').value.trim()||'00:00';
  const color=$('#nm_color').value;
  const nb=Math.max(0,parseInt($('#nm_big').value,10)||0);
  const ns=Math.max(0,parseInt($('#nm_small').value,10)||0);
  const mo=getMonth();
  if(!mo.assign[d]) mo.assign[d]={masses:[]};
  const ms={id:uid(),time,title,color,big:Array(nb).fill(''),small:Array(ns).fill('')};
  mo.assign[d].masses.push(ms);
  // 시간순 정렬
  mo.assign[d].masses.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  mo.updated=Date.now(); addAdminLog(`미사 추가 — ${d}일 ${time} ${title} (대${nb}·소${ns})`);
  save(); closeSheet(); renderSchedule(); toast('미사를 추가했습니다');
};

/* ====================== REQUESTS — 달력 탭(pick) 방식 ====================== */
/* pickMode: null | 'swap' | 'sub'  /  pickFirst: 첫 번째로 탭한 자리 */
let pickMode=null, pickFirst=null;

window.openSwap=function(){ if(!guardMonth())return; startPick('swap'); };
window.openSub =function(){ if(!guardMonth())return; startPick('sub'); };
function guardMonth(){ if(!Object.keys(getMonth().assign).length){toast('이 달의 배정이 아직 없습니다');return false;} return true; }
function startPick(mode){
  pickMode=mode; pickFirst=null;
  setView('schedule');
  renderSchedule();
  showPickBanner();
}
function cancelPick(){ pickMode=null; pickFirst=null; hidePickBanner(); renderSchedule(); }
window.cancelPick=cancelPick;

function showPickBanner(){
  const msg = pickMode==='swap'
    ? '맞교환: <b>내 복사 → 바꿀 상대</b> 순서로 누르세요'
    : '대타: <b>못 나오는 복사</b>를 누르세요';
  let b=$('#pickBanner');
  if(!b){ b=document.createElement('div'); b.id='pickBanner'; b.className='pickbanner';
    document.querySelector('#view-schedule').prepend(b); }
  b.innerHTML=`<span class="pbtxt">${msg}</span><button class="pbcancel" onclick="cancelPick()">취소</button>`;
  b.style.display='flex';
}
function hidePickBanner(){ const b=$('#pickBanner'); if(b)b.style.display='none'; }

/* 달력/목록에서 이름(또는 빈자리) 탭 */
window.pickName=function(d,mid,k,i){
  if(!pickMode) return;
  const ms=findMass(Number(d),mid); if(!ms)return;
  const n=ms[k][+i];
  const mn=Number(state.ym.split('-')[1]);
  const slot={d:Number(d),mid,k,i:+i,n,
    label:`${mn}/${d} ${ms.time} ${ms.title}`, role:(k==='big'?'대':'소'), time:ms.time, title:ms.title};
  if(pickMode==='swap'){
    if(!pickFirst){
      if(!n){toast('빈자리는 내 복사로 선택할 수 없습니다');return;}
      pickFirst=slot; renderSchedule(); // 음영 표시 갱신
      // 안내 문구 업데이트
      const b=$('#pickBanner'); if(b)b.querySelector('.pbtxt').innerHTML=`<b>${n}</b> 선택됨 — 바꿀 상대를 누르세요`;
      return;
    }
    // 두 번째 선택
    if(slot.d===pickFirst.d&&slot.mid===pickFirst.mid&&slot.k===pickFirst.k&&slot.i===pickFirst.i){
      toast('같은 자리는 선택할 수 없습니다');return;}
    openRequestPopup('swap', pickFirst, slot);
  } else { // sub: 못 나오는 복사 하나 탭 → 팝업
    if(!n){toast('빈자리는 선택할 수 없습니다');return;}
    openRequestPopup('sub', slot, null);
  }
};

/* 첨부 이미지 형태의 신청 팝업 */
function openRequestPopup(type, src, dst){
  const isSwap=type==='swap';
  let h='';
  if(isSwap){
    h+=`<div class="swapbox">
        <div class="swl"><b>${src.n}</b> <span class="swm">(${src.d}일 ${src.time} ${src.role})</span></div>
        <div class="swarrow">⇅ 맞바꿈</div>
        <div class="swl"><b>${dst.n||'(빈자리)'}</b> <span class="swm">(${dst.d}일 ${dst.time} ${dst.role})</span></div>
      </div>`;
  }else{
    h+=`<div class="swapbox">
        <div class="swl"><b>${src.n}</b> <span class="swm">(${src.d}일 ${src.time} ${src.role}) 못 나옴</span></div>
        <div class="swarrow">→ 대신할 학생</div>
      </div>`;
    h+=`<div class="field"><label>대신 들어갈 학생</label>
        <div class="subgrid">${state.roster.map(p=>
          `<button type="button" class="subname" data-name="${p.name}" onclick="selectSub(this)">${p.name}<span class="sg">${p.grade}</span></button>`).join('')}</div></div>`;
  }
  h+=`<div class="field"><label>신청자(어머니) 이름</label>
      <input id="r_name" value="${state.userName||''}" placeholder="예: 홍길동 모친"></div>`;
  h+=`<div class="field"><label>사유 (선택)</label>
      <input id="r_reason" placeholder="예: 가족 일정"></div>`;
  h+=`<div class="note">신청은 <b>승인 대기</b> 상태로 등록되며, 관리자가 승인해야 배정표에 반영됩니다.</div>`;
  h+=`<div class="popbtns"><button class="btnfull ghost" style="flex:1" onclick="closeReqPopup()">취소</button>
      <button class="btnfull" style="flex:1" onclick="submitPick('${type}')">신청하기</button></div>`;
  openSheet(isSwap?'1:1 맞교환 신청':'대타 신청', h);
  window._pickPayload={type,src,dst,subName:null};

/* 특정 월의 학생별 종류별 배정 횟수 {name:{total,dawn,weekday,sunday,special}} */
function monthCounts(ykey){
  const res={};
  const mo=state.months[ykey];
  if(mo&&mo.assign){
    Object.values(mo.assign).forEach(day=>{
      (day&&day.masses||[]).forEach(ms=>{
        const cat=massCategory(ms.title); // dawn/weekday/sunday/special/etc
        [...(ms.big||[]),...(ms.small||[])].forEach(n=>{ if(!n)return;
          res[n]=res[n]||{total:0,dawn:0,weekday:0,sunday:0,special:0};
          res[n].total++; if(res[n][cat]!=null) res[n][cat]++;
        });
      });
    });
  }
  return res;
}
/* 1월~지정한 달(upToMonth)까지의 누적 횟수(시드 포함). buildAssignTally를 그 달까지 합산.
   total = dawn+weekday+sunday+special+etc 가 항상 성립하도록 같은 출처(byCat)에서만 계산.
   반환: {이름:{total,dawn,weekday,sunday,special,etc}} */
function cumulativeCounts(year, upToMonth){
  const t=buildAssignTally(year); // {total:{name:{m:n,sum}}, byCat:{cat:{name:{m:n,sum}}}}
  const res={};
  const ensure=n=>res[n]=res[n]||{total:0,dawn:0,weekday:0,sunday:0,special:0,etc:0};
  const sumUpTo=(rec)=>{ let s=0; if(!rec)return 0; for(let m=1;m<=upToMonth;m++) s+=rec[m]||0; return s; };
  // 카테고리별 합(같은 출처) → 계는 카테고리 합으로 산출(불일치 원천 차단)
  const cats=['dawn','weekday','sunday','special','etc'];
  cats.forEach(cat=>{
    const src=t.byCat[cat]||{};
    for(const n in src){ ensure(n); const v=sumUpTo(src[n]); res[n][cat]=v; res[n].total+=v; }
  });
  return res;
}

/* 그 달(year-month) 한 달의 카테고리별 횟수.
   buildAssignTally를 사용하므로, 그 달 실제 배정이 있으면 실제값, 없으면 시드(SEED_ASSIGN_COUNT) 값이 반영된다.
   반환: {이름:{total,dawn,weekday,sunday,special,etc}} */
function monthCountsCat(ykey){
  const [yy,mm]=ykey.split('-').map(Number);
  const t=buildAssignTally(yy);  // {total:{name:{m:n,sum}}, byCat:{cat:{name:{m:n,sum}}}}
  const res={};
  const ensure=n=>res[n]=res[n]||{total:0,dawn:0,weekday:0,sunday:0,special:0,etc:0};
  ['dawn','weekday','sunday','special','etc'].forEach(cat=>{
    const src=t.byCat[cat]||{};
    for(const n in src){ const v=src[n][mm]||0; if(!v)continue; ensure(n); res[n][cat]=v; res[n].total+=v; }
  });
  return res;
}

window.editLaundry=function(yk){

/* ===== 복사 배정 월 누적 횟수 표 ===== */
let countYear=null, countCat='total';
window.openCountTally=function(){
  if(countYear==null) countYear=Number(state.ym.split('-')[0]);
  countCat='total';
  renderCountTally();
};
function renderCountTally(){
  const year=countYear;
  const data=buildAssignTally(year);
  const tabs=[{key:'total',label:'총합'}].concat(MASS_CATEGORIES.map(c=>({key:c.key,label:c.label})));
  let h=`<div class="tallybar">
    <button class="tnav" onclick="countYear--;renderCountTally()">‹</button>
    <b>${year}년</b>
    <button class="tnav" onclick="countYear++;renderCountTally()">›</button></div>`;
  // 종류 탭
  h+='<div class="ctabs">';
  tabs.forEach(t=>h+=`<button class="ctab ${countCat===t.key?'on':''}" onclick="countCat='${t.key}';renderCountTally()">${t.label}</button>`);
  h+='</div>';
  // 표
  const tally = countCat==='total' ? data.total : data.byCat[countCat];
  // 학년 순으로 정렬, 배정 0도 표시
  const ordered=[...state.roster].sort((a,b)=>gradeRank(a.grade)-gradeRank(b.grade));
  h+='<div class="tallywrap"><table class="tallytbl counttbl"><tr><th class="kindcol">이름</th>';
  for(let m=1;m<=12;m++) h+=`<th>${m}</th>`;
  h+='<th class="sumcol">계</th></tr>';
  let anyRow=false;
  ordered.forEach(p=>{
    const rec=tally[p.name];
    const sum=rec?rec.sum:0;
    // 배정 한 번도 없는 학생은 총합 탭에서만 표시(종류별은 0이면 생략해 표가 길어지지 않게)
    if(countCat!=='total' && !sum) return;
    anyRow=true;
    h+=`<tr><td class="kindcol">${p.name}<i class="cg">${p.grade}</i></td>`;
    for(let m=1;m<=12;m++){ const v=rec&&rec[m]?rec[m]:0; h+=`<td class="${v?'':'z'}">${v||''}</td>`; }
    h+=`<td class="sumcol">${sum||0}</td>`;
    h+='</tr>';
  });
  h+='</table></div>';
  if(!anyRow) h+='<div class="help">이 종류의 배정 기록이 아직 없습니다.</div>';
  h+=`<div class="help">실제 배정표(${year}년 1~12월)에서 자동 집계됩니다. 빈칸은 0회입니다.</div>`;
  h+=`<button class="btnfull ghost" onclick="exportCountTally()">📤 엑셀로 내보내기</button>`;
  openSheet('복사 배정 월 누적 횟수',h);
}
window.exportCountTally=function(){
  const year=countYear; const data=buildAssignTally(year);
  const wb=XLSX.utils.book_new();
  const ordered=[...state.roster].sort((a,b)=>gradeRank(a.grade)-gradeRank(b.grade));
  const makeSheet=(tally,name)=>{
    const head=['이름','학년',...Array.from({length:12},(_,i)=>`${i+1}월`),'계'];
    const rows=[head];
    ordered.forEach(p=>{ const rec=tally[p.name]; const sum=rec?rec.sum:0;
      rows.push([p.name,p.grade,...Array.from({length:12},(_,i)=>rec&&rec[i+1]?rec[i+1]:0),sum]); });
    const ws=XLSX.utils.aoa_to_sheet(rows); XLSX.utils.book_append_sheet(wb,ws,name);
  };
  makeSheet(data.total,'총합');
  MASS_CATEGORIES.forEach(c=>makeSheet(data.byCat[c.key],c.label));
  XLSX.writeFile(wb,`복사배정_월누적_${year}.xlsx`);
};

/* ===== 학년별 최소~최대 배정 횟수 설정 ===== */
window.openLimits=function(){
  const L = state.gradeLimits ? JSON.parse(JSON.stringify(state.gradeLimits)) : JSON.parse(JSON.stringify(DEFAULT_GRADE_LIMITS));
  // 누락 학년 보정
  GRADES.forEach(g=>{ if(!L[g]) L[g]={min:(DEFAULT_GRADE_LIMITS[g]||{min:0}).min, max:(DEFAULT_GRADE_LIMITS[g]||{max:99}).max}; });
  window._limDraft=L;
  let h=`<div class="note">학년별 한 달 배정 횟수의 <b>최소~최대</b>를 정합니다. 자동배정은 최대를 넘지 않게 제한하고, 최소는 가능한 한 채웁니다.</div>`;
  h+='<div class="limtbl"><div class="limrow limhd"><span>학년</span><span>최소</span><span>최대</span></div>';
  GRADES.forEach(g=>{
    const lim=L[g];
    h+=`<div class="limrow">
      <span class="lg">${g}</span>
      <span class="lc"><button class="stp" onclick="bumpLimit('${g}','min',-1)">−</button><b id="lim_${g}_min">${lim.min}</b><button class="stp" onclick="bumpLimit('${g}','min',1)">＋</button></span>
      <span class="lc"><button class="stp" onclick="bumpLimit('${g}','max',-1)">−</button><b id="lim_${g}_max">${lim.max}</b><button class="stp" onclick="bumpLimit('${g}','max',1)">＋</button></span>
    </div>`;
  });
  h+='</div>';
  h+=`<button class="btnfull" onclick="saveLimits()">저장</button>
      <button class="btnfull ghost" onclick="resetLimits()">기본값으로 초기화</button>`;
  openSheet('학년별 배정 횟수',h);
};
window.bumpLimit=function(g,which,delta){
  const L=window._limDraft; if(!L[g])return;
  let v=L[g][which]+delta;
  if(v<0)v=0; if(v>31)v=31;
  // min은 max 이하로, max는 min 이상으로 유지
  if(which==='min' && v>L[g].max) v=L[g].max;
  if(which==='max' && v<L[g].min) v=L[g].min;
  L[g][which]=v;
  const el=document.getElementById(`lim_${g}_${which}`); if(el)el.textContent=v;
};
window.saveLimits=function(){
  state.gradeLimits=window._limDraft;
  addAdminLog('학년별 배정 횟수 설정 변경');
  save(); closeSheet(); toast('저장되었습니다');
};
window.resetLimits=function(){
  if(!confirm('학년별 횟수를 기본값으로 되돌릴까요?'))return;
  state.gradeLimits=null;
  save(); closeSheet(); toast('기본값으로 초기화했습니다');
};

/* ===== 방학 설정(학교별 기간 + 봉사 학년) ===== */
window.openVacation=function(){
  const cfg=JSON.parse(JSON.stringify(vacationCfg()));
  cfg.schools=cfg.schools||{}; cfg.grades=cfg.grades||[]; cfg.time=cfg.time||'10:00';
  // 각 학교에 summer/winter 보장
  for(const s in cfg.schools){
    const sc=cfg.schools[s]||{};
    if(('start' in sc || 'end' in sc) && !sc.summer){ cfg.schools[s]={summer:{start:sc.start||'',end:sc.end||''},winter:{start:'',end:''}}; }
    else { cfg.schools[s]={summer:sc.summer||{start:'',end:''}, winter:sc.winter||{start:'',end:''}}; }
  }
  if(!Object.keys(cfg.schools).length){
    [...new Set(state.roster.map(p=>p.school).filter(Boolean))].forEach(s=>{ cfg.schools[s]={summer:{start:'',end:''},winter:{start:'',end:''}}; });
  }
  window._vacDraft=cfg;
  renderVacation();
};

  MASS_GRADE_DEFS.forEach(d=>{

window.toggleMassGrade=function(key,g,on){
  const arr=window._mgDraft[key]=window._mgDraft[key]||[];
  if(on){ if(!arr.includes(g)) arr.push(g); }
  else {
    window._mgDraft[key]=arr.filter(x=>x!==g);

    window._mgPri[key]=(window._mgPri[key]||[]).filter(x=>x!==g);
  }
  renderMassGrades();
};
window.toggleMassPriority=function(key,g){

  const arr=window._mgPri[key]=window._mgPri[key]||[];

window.editTallyCell=function(key,m){
  const year=tallyYear;
  const label=SPECIAL_KINDS.find(k=>k.key===key).label;

  let monthExists = !!(state.months[yk] && state.months[yk].assign && Object.keys(state.months[yk].assign).length);
  // 틀이 없으면 자동 생성 → 미사 틀과 상관없이 특별미사 자리에 바로 배정 가능하게 함
  if(!monthExists){
    state.months[yk]=genMonth(year,m);
    state.ym=yk;                       // 화면 현재 달도 맞춰 이후 자동배정 대상 일치

        (mm.mass[kind]||[]).forEach((nm,si)=>{
          const sl = kind==='big' ? (si===0?'대대':'대소') : (si===0?'소대':'소소');

      });

  } else {

  if(!man.length) h+='<span class="help">없음</span>';
  man.forEach(n=>h+=`<span class="tname man">${n}<button class="trm" onclick="removeTallyName('${key}',${m},'${n.replace(/'/g,"\\'")}')">✕</button></span>`);
  h+='</div>';
  const qualified=state.roster.filter(p=>p.q&&p.q[key]);
  h+='<div class="tpick">';
  qualified.forEach(p=>h+=`<button class="tpk q" onclick="addTallyName('${key}',${m},'${p.name.replace(/'/g,"\\'")}')">${p.name}<i>${p.grade}</i></button>`);

  h+='</div>';

  h+=`<button class="btnfull ghost" onclick="renderTally()">← 누적표로</button>`;
  openSheet('특별미사 배정 · 기록',h);

let _specialPick=null; // {key,m,mi,kind,si,name}
window.pickSpecialSlot=function(key,m,mi,kind,si){
  const year=tallyYear;
  const label=SPECIAL_KINDS.find(k=>k.key===key).label;
  const masses=findSpecialMasses(year,m,key);
  const mm=masses[mi]; if(!mm){ editTallyCell(key,m); return; }
  const cur=(mm.mass[kind]||[])[si]||'';
  // 선택 상태 초기화: 현재 자리값을 기본 선택으로
  _specialPick={key,m,mi,kind,si,name:cur};
  // 특별미사 자리는 관리자가 명단에서 누구든 직접 등록(자격·대대제외·제외 제한 없음)
  let cand=state.roster.slice();
  // 같은 미사에 이미 들어간 사람은 제외(중복 방지), 단 현재 자리값은 허용
  const usedHere=new Set([...(mm.mass.big||[]),...(mm.mass.small||[])].filter(Boolean));
  const slotLabel = kind==='big' ? (si===0?'대대':'대소') : (si===0?'소대':'소소');
  let h=`<div class="note">${year}년 ${m}/${mm.day} · ${label} · ${slotLabel} 자리</div>`;
  h+='<div class="tpick">';
  h+=`<button class="tpk ${cur===''?'sel':''}" data-pick="" onclick="selectSpecialName('')">— 비움 —</button>`;
  cand.forEach(p=>{
    const dup = usedHere.has(p.name) && p.name!==cur;
    const nm=p.name.replace(/'/g,"\\'");
    h+=`<button class="tpk q ${p.name===cur?'sel':''}" data-pick="${p.name.replace(/"/g,'&quot;')}" ${dup?'disabled style="opacity:.4"':''} onclick="selectSpecialName('${nm}')">${p.name}<i>${p.grade}</i></button>`;
  });
  if(!cand.length) h+=`<span class="help">명단에 학생이 없습니다.</span>`;
  h+='</div>';
  h+=`<div class="popbtns">
        <button class="btnfull ghost" onclick="editTallyCell('${key}',${m})">← 뒤로</button>
        <button class="btnfull" id="specialSaveBtn" onclick="saveSpecialSlot()">저장</button>
      </div>`;
  openSheet('자리 배정',h);
};

window.selectSpecialName=function(name){

window.saveSpecialSlot=function(){

window.setSpecialSlot=function(key,m,mi,kind,si,name,close){
  const year=tallyYear;
  const mo=state.months[ym(year,m)]; if(!mo){ editTallyCell(key,m); return; }
  const masses=findSpecialMasses(year,m,key);
  const mm=masses[mi]; if(!mm){ editTallyCell(key,m); return; }
  mm.mass[kind][si]=name;
  mo.updated=Date.now();
  state.ym=ym(year,m);  // 특별미사 편집 중인 달을 화면 현재 달로 맞춤(이후 자동배정 대상 일치)
  addAdminLog(`특별미사 배정 — ${year}/${m}/${mm.day} ${SPECIAL_KINDS.find(k=>k.key===key).label} ${kind==='big'?'대':'소'}${si+1}: ${name||'(비움)'}`);
  save(); renderSchedule();
  _specialPick=null;
  if(close){ renderTally(); }     // '저장' 버튼 흐름: 누적표 화면으로 돌아가기
  else { editTallyCell(key,m); }  // 기타 호출: 이전 화면 유지

function ensureLogPath(year,key){
  state.specialLog=state.specialLog||{};

  state.specialLog[year][key]=state.specialLog[year][key]||{};
}
window.addTallyName=function(key,m,name){

  if(autoNames(year,key,m).includes(name)||manualNames(year,key,m).includes(name)){ toast('이미 기록되어 있습니다'); return; }

  (state.specialLog[year][key][m]=state.specialLog[year][key][m]||[]).push(name);

window.removeTallyName=function(key,m,name){

$('#uploadBtn').onclick=()=>$('#fileInput').click();
$('#fileInput').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    parseRoster(rows);
  };
  rd.readAsArrayBuffer(f); e.target.value='';
};
function parseRoster(rows){
  // find header row containing 성명
  let hi=rows.findIndex(r=>r&&r.some(c=>String(c).trim()==='성명'));
  if(hi<0){toast('머리글(성명)을 찾을 수 없습니다');return;}
  const head=rows[hi].map(c=>String(c==null?'':c).trim());
  const col=name=>head.findIndex(h=>h.includes(name));
  const ci={grade:col('학년'),name:col('성명'),school:col('학교'),
    seongsigan:col('성시간'),sinsim:col('신심'),chanyang:col('찬양'),saebyeok:col('새벽'),
    pyeongil:col('평일'),children:col('어린이'),weekend:col('주일'),vacation:col('방학'),bigo:col('비고')};
  const newRoster=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i]; if(!r)continue;
    const nm=ci.name>=0?String(r[ci.name]||'').trim():'';

    const bigo=ci.bigo>=0?String(r[ci.bigo]||'').trim():'';

}
